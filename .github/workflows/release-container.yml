# Release workflow — publishes container images AND reproducible Go
# binaries to a GitHub Release on every semver tag (e.g. `git tag v0.1.0
# && git push origin v0.1.0`).
#
# Major Update Phase 2.3 split the node into validator and miner
# profiles, and later phases added the external scraper (trustcheck)
# and the genesis-ceremony dry-run tool. Every one of those needs a
# predictable, signable release artefact — not only the legacy
# qsdm node image.
#
# Artefact layout per tag:
#
#   Container images (pushed to GHCR):
#     ghcr.io/<owner>/qsdm:<semver>      — legacy name, Dockerfile
#     ghcr.io/<owner>/qsdm-validator:<semver> — CPU-only validator image
#     ghcr.io/<owner>/qsdm-miner:<semver>     — GPU miner image (CUDA / NVIDIA)
#
# NOTE: the short-lived `qsdm-miner-console` image (CPU-only, distroless)
# has been retired as part of the NVIDIA-lock pivot; see
# nvidia_locked_qsdm_blockchain_architecture.md and the deprecation
# banner in cmd/qsdmminer-console/main.go.
#
#   Binaries (attached to the GitHub Release as assets):
#     qsdmminer-<os>-<arch>[.exe]            — CPU reference miner (audit-clean)
#     qsdmminer-console-<os>-<arch>[.exe]    — friendly console miner (wizard + live panel)
#     trustcheck-<os>-<arch>[.exe]           — black-box transparency scraper
#     genesis-ceremony-<os>-<arch>[.exe]     — mainnet genesis dry-run tool
#     SHA256SUMS                             — canonical hashes over all of the above
#
# Reproducibility: every binary is built with `-trimpath` (strip cwd
# paths from debug info), CGO_ENABLED=0 (static), and `-ldflags="-s -w"`
# (strip symbol + DWARF tables). Build is deterministic given the
# same Go toolchain version pinned by QSDM/source/go.mod.
name: Release container

on:
  push:
    tags:
      - "v*"
  # Allows tag owners to re-run the release manually without having
  # to push a new tag if a transient infra failure drops one asset.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write # needed to upload release assets
  packages: write # needed to push to ghcr.io
  id-token: write # needed for cosign keyless signing (Sigstore OIDC)
  attestations: write # needed for `gh attestation` provenance

jobs:
  # ---------------------------------------------------------------------------
  # Go binaries — cross-compiled, -trimpath, stripped. Uploaded to the
  # GitHub Release via gh release upload.
  # ---------------------------------------------------------------------------
  binaries:
    name: binaries (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: QSDM/source/go.mod

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip refs/tags/ prefix.
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build metadata (git SHA, UTC build date)
        id: meta
        # The release workflow is the only place GitSHA and BuildDate
        # get injected into binaries, so `--version` output from a
        # tagged artefact reliably identifies the exact commit +
        # build-time pair that produced it. Dev builds (local `go
        # build`, `go run`) keep their "dev"/"unknown" sentinels.
        run: |
          SHA="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "Building with SHA=${SHA} DATE=${DATE} TAG=${{ steps.tag.outputs.tag }}"

      - name: Build reproducible binaries
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          # All four binaries compile under the full profile (no
          # validator_only tag) because qsdmminer / qsdmminer-console
          # require the mining implementation and the tooling binaries
          # are profile-agnostic. trustcheck and genesis-ceremony are
          # stdlib-only (plus golang.org/x/crypto for the latter) so
          # they cross-compile cleanly to every matrix target.
          # qsdmminer-console pulls golang.org/x/term for TTY detection
          # and BurntSushi/toml for ~/.qsdm/miner.toml persistence;
          # both are pure-Go deps already in go.mod and stay CGO-free.
          #
          # -ldflags -X embeds the release tag, short git SHA, and
          # build date into pkg/buildinfo so every binary's --version
          # output maps back to a specific commit + release pair.
          # All four release artefacts consume these same vars (see
          # cmd/qsdmminer, cmd/qsdmminer-console, cmd/trustcheck,
          # cmd/genesis-ceremony — each has a --version flag wired to
          # pkg/buildinfo.String).
          mkdir -p /tmp/artefacts
          suffix="${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          LDFLAGS="-s -w \
            -X github.com/blackbeardONE/QSDM/pkg/buildinfo.Version=${{ steps.tag.outputs.tag }} \
            -X github.com/blackbeardONE/QSDM/pkg/buildinfo.GitSHA=${{ steps.meta.outputs.sha }} \
            -X github.com/blackbeardONE/QSDM/pkg/buildinfo.BuildDate=${{ steps.meta.outputs.date }}"

          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "/tmp/artefacts/qsdmminer-${suffix}" ./cmd/qsdmminer

          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "/tmp/artefacts/qsdmminer-console-${suffix}" ./cmd/qsdmminer-console

          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "/tmp/artefacts/trustcheck-${suffix}" ./cmd/trustcheck

          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "/tmp/artefacts/genesis-ceremony-${suffix}" ./cmd/genesis-ceremony

          ls -la /tmp/artefacts

      - name: Smoke-check --version on a native-arch artefact
        # Only the linux/amd64 matrix cell runs the native binary —
        # cross-compiled cells cannot exec the binary they produced.
        # This catches the (easy-to-regress) case where --version
        # prints "dev"/"unknown" despite the ldflags injection
        # working — it means a cmd/ main forgot to wire pkg/buildinfo.
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          suffix="${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          for bin in qsdmminer qsdmminer-console trustcheck genesis-ceremony; do
            out="$(/tmp/artefacts/${bin}-${suffix} --version)"
            echo "${bin}: ${out}"
            echo "${out}" | grep -q "${{ steps.tag.outputs.tag }}" \
              || { echo "FAIL: ${bin} --version missing tag ${{ steps.tag.outputs.tag }}"; exit 1; }
            echo "${out}" | grep -q "${{ steps.meta.outputs.sha }}" \
              || { echo "FAIL: ${bin} --version missing git SHA"; exit 1; }
          done

      - name: Compute SHA256SUMS for this matrix cell
        run: |
          cd /tmp/artefacts
          sha256sum ./* > "SHA256SUMS-${{ matrix.os }}-${{ matrix.arch }}"
          cat "SHA256SUMS-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload artefacts (for the aggregator job)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            /tmp/artefacts/qsdmminer-*
            /tmp/artefacts/qsdmminer-console-*
            /tmp/artefacts/trustcheck-*
            /tmp/artefacts/genesis-ceremony-*
            /tmp/artefacts/SHA256SUMS-*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Source SBOM. Generated once per release and attached to every artefact
  # type below (binaries + each container image), so reviewers can audit
  # the dependency tree of any release without rebuilding from source.
  #
  # We use anchore/sbom-action (production-stable, used by kubernetes,
  # buildpacks, jenkins, etc.) which wraps Syft and emits SPDX 2.3.
  # ---------------------------------------------------------------------------
  source-sbom:
    name: source SBOM (SPDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM for QSDM/source (full Go module + transitive deps)
        uses: anchore/sbom-action@v0
        with:
          path: QSDM/source
          format: spdx-json
          output-file: /tmp/qsdm-source-sbom.spdx.json

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: qsdm-source-sbom
          path: /tmp/qsdm-source-sbom.spdx.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Aggregator: download every matrix cell, produce one canonical
  # SHA256SUMS, sign every binary keylessly with cosign (Sigstore OIDC),
  # and attach everything (binaries + .sig + .pem certs + SBOM) to the
  # GitHub Release.
  #
  # Operator verification (no secrets required, only `cosign`):
  #
  #   cosign verify-blob \
  #     --certificate qsdmminer-linux-amd64.pem \
  #     --signature   qsdmminer-linux-amd64.sig \
  #     --certificate-identity-regexp 'https://github.com/.+/.github/workflows/release-container.yml@refs/tags/v.+' \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
  #     qsdmminer-linux-amd64
  #
  # The matching certificate proves the release was minted by THIS workflow
  # at THIS tag — a stolen NPM_TOKEN / DOCKERHUB_TOKEN cannot forge it.
  # ---------------------------------------------------------------------------
  release-assets:
    name: attach binaries + SBOM + signatures to release
    needs: [binaries, source-sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign (keyless Sigstore signer)
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all matrix artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: /tmp/assets
          merge-multiple: true

      - name: Download source SBOM
        uses: actions/download-artifact@v4
        with:
          name: qsdm-source-sbom
          path: /tmp/assets

      - name: Consolidate SHA256SUMS
        run: |
          cd /tmp/assets
          # Join per-cell hash files into one canonical list sorted
          # lexically so operators can diff across releases cleanly.
          cat SHA256SUMS-* | sort > SHA256SUMS
          rm -f SHA256SUMS-*
          # Hash the SBOM too so a tampered SBOM is also caught.
          sha256sum qsdm-source-sbom.spdx.json >> SHA256SUMS
          echo "=== Final SHA256SUMS ==="
          cat SHA256SUMS

      - name: Cosign-sign every binary + the SBOM (keyless / OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd /tmp/assets
          for f in qsdmminer-* qsdmminer-console-* trustcheck-* genesis-ceremony-* SHA256SUMS qsdm-source-sbom.spdx.json; do
            # Skip already-produced .sig / .pem so a re-run is idempotent.
            case "$f" in
              *.sig|*.pem) continue ;;
            esac
            echo "==> cosign sign-blob $f"
            cosign sign-blob \
              --yes \
              --output-signature   "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -la

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          # Create the release if it doesn't already exist (re-run
          # from workflow_dispatch is a no-op against an existing
          # release; upload --clobber replaces assets in place).
          # NOTE: `gh release create --verify-tag` was removed because the
          # gh CLI's tag verification needs to be run from inside a git
          # repository, but `gh release upload` (the line below) runs
          # from /tmp/assets after we cd into it. The tag is *already*
          # pushed (it's what triggered this workflow), so the
          # verification was always redundant. Pass --repo explicitly
          # so neither gh call needs to be inside a git working tree.
          REPO_FLAG="--repo ${{ github.repository }}"
          if ! gh release view "$TAG" $REPO_FLAG >/dev/null 2>&1; then
            gh release create "$TAG" $REPO_FLAG \
              --title "$TAG" \
              --notes "Automated release by .github/workflows/release-container.yml. SBOM (SPDX 2.3) and per-asset cosign keyless signatures attached. See CHANGELOG.md."
          fi
          cd /tmp/assets
          # NOTE: the previous version of this command listed
          # `qsdmminer-* qsdmminer-console-* trustcheck-* genesis-ceremony-*
          #  qsdm-source-sbom.spdx.json SHA256SUMS *.sig *.pem`
          # which double-matched every binary's sibling .sig / .pem
          # (qsdmminer-linux-amd64.sig matched both `qsdmminer-*` AND
          # `*.sig`). gh release upload then tried to upload the same
          # file twice and the GitHub API rejected the second attempt
          # with HTTP 422 "ReleaseAsset.name already exists" (despite
          # --clobber, which only de-duplicates against the existing
          # release, not against earlier names in the same call).
          # Listing the directory once with a single glob avoids the
          # duplicate-match entirely; /tmp/assets contains only the
          # exact set of release artefacts at this point.
          ls -1
          gh release upload "$TAG" $REPO_FLAG --clobber ./*

  # ---------------------------------------------------------------------------
  # Container images.
  # ---------------------------------------------------------------------------
  ghcr-legacy:
    name: ghcr qsdm (legacy image name)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install cosign (keyless image signer)
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (qsdm legacy)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qsdm
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push (legacy qsdm name)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: QSDM
          file: QSDM/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=qsdm
          cache-to: type=gha,mode=max,scope=qsdm

      - name: Pull built image into local docker daemon for syft
        # docker/build-push-action with push: true uses the
        # docker-container buildx driver, which does NOT make the
        # resulting image visible to the local docker daemon. anchore/
        # sbom-action's syft then has to scan the remote ghcr.io
        # reference, and on the first v0.3.0 run that failed two
        # different ways:
        #   (a) without registry creds, syft got exit 1 against the
        #       freshly-pushed (private) GHCR image;
        #   (b) WITH registry-username/registry-password set, the
        #       action prepended `registry:` to the image URL, and
        #       syft v1.42.3 cannot parse `registry:...@sha256:...`
        #       (it works only for tag refs, not digest refs).
        # Pulling the image into the daemon first sidesteps both:
        # syft sees a local image and scans it with no registry I/O.
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ github.repository_owner }}/qsdm@${{ steps.build.outputs.digest }}"

      - name: Generate image SBOM (SPDX) and attach to image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/qsdm@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/qsdm-image-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Cosign-sign image (keyless Sigstore OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "==> cosign sign $tag@${{ steps.build.outputs.digest }}"
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          DIGEST_REF="ghcr.io/${{ github.repository_owner }}/qsdm@${{ steps.build.outputs.digest }}"
          cosign attest --yes \
            --predicate /tmp/qsdm-image-sbom.spdx.json \
            --type spdxjson \
            "$DIGEST_REF"

  ghcr-validator:
    name: ghcr qsdm-validator (CPU-only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (qsdm-validator)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qsdm-validator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push validator image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: QSDM
          file: QSDM/Dockerfile.validator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=qsdm-validator
          cache-to: type=gha,mode=max,scope=qsdm-validator

      - name: Pull built image into local docker daemon for syft
        # See ghcr-legacy job for the rationale; same pattern.
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ github.repository_owner }}/qsdm-validator@${{ steps.build.outputs.digest }}"

      - name: Generate image SBOM (SPDX) and attach
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/qsdm-validator@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/qsdm-validator-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Cosign-sign validator image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          DIGEST_REF="ghcr.io/${{ github.repository_owner }}/qsdm-validator@${{ steps.build.outputs.digest }}"
          cosign attest --yes \
            --predicate /tmp/qsdm-validator-sbom.spdx.json \
            --type spdxjson \
            "$DIGEST_REF"

  ghcr-miner:
    name: ghcr qsdm-miner (GPU miner runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (qsdm-miner)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qsdm-miner
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push miner image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: QSDM
          file: QSDM/Dockerfile.miner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=qsdm-miner
          cache-to: type=gha,mode=max,scope=qsdm-miner

      - name: Pull built image into local docker daemon for syft
        # See ghcr-legacy job for the rationale; same pattern.
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ github.repository_owner }}/qsdm-miner@${{ steps.build.outputs.digest }}"

      - name: Generate image SBOM (SPDX) and attach
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/qsdm-miner@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/qsdm-miner-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Cosign-sign miner image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          DIGEST_REF="ghcr.io/${{ github.repository_owner }}/qsdm-miner@${{ steps.build.outputs.digest }}"
          cosign attest --yes \
            --predicate /tmp/qsdm-miner-sbom.spdx.json \
            --type spdxjson \
            "$DIGEST_REF"
