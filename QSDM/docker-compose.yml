version: '3.8'

services:
  qsdm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qsdm-node
    ports:
      - "8080:8080"
    volumes:
      - ./qsdmplus.db:/app/qsdmplus.db
      - ./qsdmplus.log:/app/qsdmplus.log
      - ./config:/app/config
    environment:
      - USE_SCYLLA=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

