openapi: 3.0.3
info:
  title: QSDM HTTP API
  description: |
    Quantum-Secure Dynamic Mesh Ledger (QSDM, formerly QSDM) HTTP API with
    military-grade security. Native coin: Cell (CELL), 8 decimals, smallest
    unit `dust`.
    
    All authenticated endpoints require:
    - JWT Bearer token in Authorization header
    - Request signing for POST/PUT/DELETE requests (X-Timestamp, X-Nonce, X-Signature headers)
    
    Security Features:
    - TLS 1.3 encryption
    - Quantum-safe JWT tokens (CRYSTALS-Dilithium)
    - Request signing with quantum-safe signatures
    - Rate limiting: default **100 requests per client per minute** (`[api] rate_limit_max_requests` / `rate_limit_window` or `QSDM_API_RATE_LIMIT_MAX` / `QSDM_API_RATE_LIMIT_WINDOW`; the legacy `QSDM_*` env vars continue to be accepted during the deprecation window, see `REBRAND_NOTES.md`). Some routes are stricter (e.g. GET /monitoring/ngc-challenge at 15/min). **GET /health** and **/health/*** are exempt so probes are not throttled.
    - Replay attack protection
    - Role-based access control
    
    **Submesh policy (optional):** When the node loads `[network] submesh_config` / `QSDM_SUBMESH_CONFIG` (legacy alias: `QSDM_SUBMESH_CONFIG`), some ledger routes may return **422 Unprocessable Entity** if fee+geotag do not match a profile or the serialized payload exceeds `max_tx_size` (wallet send), or mint/token-create exceeds the strictest profile cap. See main README “Submesh profiles”.
  version: 1.0.0
  contact:
    name: QSDM Development Team
    url: https://github.com/blackbeardONE/QSDM

servers:
  - url: https://localhost:8443/api/v1
    description: Production server (HTTPS)
  - url: http://localhost:8080/api/v1
    description: Development server (HTTP - insecure)

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and registration
  - name: Wallet
    description: Wallet operations
  - name: Transactions
    description: Transaction management
  - name: Validator
    description: Transaction validation
  - name: Monitoring
    description: NGC proof ingest and operator endpoints (shared ingest secret header; not JWT)

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns API health status (public endpoint)
      operationId: healthCheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: integer
                    format: int64
                    example: 1234567890
                  version:
                    type: string
                    example: "1.0.0"
                  nvidia_lock:
                    type: object
                    description: Present when configured; includes proof_ok, ingest_nonce flags, http_blocks_total, ngc_challenge_* counters, ngc_ingest_nonce_pool_size (see deploy/README.md).

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Minimal process liveness (always **200** when the API accepts HTTP). Not rate limited.
      operationId: healthLive
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive
                  timestamp:
                    type: integer
                    format: int64
                  product:
                    type: string

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: |
        **200** when **storage** `Ready()` succeeds; **503** when storage is unreachable.
        **wallet_service** is `ok` or `unavailable` (informational; does not flip status alone).
        Not rate limited.
      operationId: healthReady
      responses:
        '200':
          description: Ready (storage OK)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  timestamp:
                    type: integer
                    format: int64
                  checks:
                    type: object
                    additionalProperties:
                      type: string
        '503':
          description: Storage check failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
                  checks:
                    type: object

  /monitoring/ngc-challenge:
    get:
      tags:
        - Monitoring
      summary: Issue ingest nonce (NVIDIA-lock nonce mode)
      description: |
        Public for JWT purposes; requires `X-QSDM-NGC-Secret` (or legacy `X-QSDM-NGC-Secret`) matching the node's ingest secret.
        Returns 404 when `nvidia_lock_require_ingest_nonce` is disabled. Rate limited to **15 requests/minute** per client (IP or X-API-Key).
        On 429, `Retry-After` is set (seconds).
      operationId: ngcIngestChallenge
      parameters:
        - $ref: '#/components/parameters/NgcIngestSecretPrimary'
        - $ref: '#/components/parameters/NgcIngestSecretLegacy'
      responses:
        '200':
          description: Nonce issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  qsdm_ingest_nonce:
                    type: string
                  expires_at_unix:
                    type: integer
                    format: int64
                  ttl_seconds:
                    type: integer
        '404':
          description: Ingest nonce challenge disabled
        '401':
          description: Missing or invalid ingest secret
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
                description: Seconds until the client may retry

  /monitoring/ngc-proof:
    post:
      tags:
        - Monitoring
      summary: Ingest NGC GPU proof bundle
      description: |
        Accepts JSON proof bundles from the NGC sidecar. Requires ingest secret headers.
        Rate limited (default 30/min per path key). See deploy README for NVIDIA-lock and HMAC/nonce behavior.
      operationId: ngcProofIngest
      parameters:
        - $ref: '#/components/parameters/NgcIngestSecretPrimary'
        - $ref: '#/components/parameters/NgcIngestSecretLegacy'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Proof bundle (cuda_proof_hash, gpu_fingerprint, optional qsdm_* fields)
      responses:
        '200':
          description: Ingest accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Invalid body or proof validation failed
        '404':
          description: NGC ingest not configured on node
        '413':
          description: Body too large
        '429':
          description: Rate limit exceeded

  /monitoring/ngc-proofs:
    get:
      tags:
        - Monitoring
      summary: List ingested proof summaries
      description: Operator view of recent ingested bundles (same secret as ingest).
      operationId: ngcProofList
      parameters:
        - $ref: '#/components/parameters/NgcIngestSecretPrimary'
        - $ref: '#/components/parameters/NgcIngestSecretLegacy'
      responses:
        '200':
          description: Summary list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  proofs:
                    type: array
                    items:
                      type: object
        '404':
          description: NGC ingest not configured
        '429':
          description: Rate limit exceeded

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Register a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - password
              properties:
                address:
                  type: string
                  description: Wallet address
                  example: "wallet_address_123"
                password:
                  type: string
                  format: password
                  minLength: 8
                  description: User password (minimum 8 characters)
                  example: "Charming123!"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "user registered successfully"
                  address:
                    type: string
        '400':
          description: Invalid input
        '409':
          description: User already exists

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login and receive JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - password
              properties:
                address:
                  type: string
                  example: "wallet_address_123"
                password:
                  type: string
                  format: password
                  example: "Charming123!"
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT access token (15 minutes)
                  refresh_token:
                    type: string
                    description: JWT refresh token (7 days)
                  expires_in:
                    type: integer
                    description: Access token expiration in seconds
                    example: 900
        '401':
          description: Invalid credentials

  /wallet/create:
    post:
      tags:
        - Wallet
      summary: Create wallet
      description: Create a new wallet (requires authentication)
      operationId: createWallet
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Wallet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                  balance:
                    type: number
                    format: float
        '401':
          description: Unauthorized
        '500':
          description: Failed to create wallet (e.g. crypto or key generation error; check server logs)

  /wallet/balance:
    get:
      tags:
        - Wallet
      summary: Get wallet balance
      description: Get balance for a wallet address
      operationId: getBalance
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: query
          description: Wallet address (defaults to authenticated user's address)
          schema:
            type: string
      responses:
        '200':
          description: Balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                  balance:
                    type: number
                    format: float
        '400':
          description: Missing address (query and no authenticated user address)
        '401':
          description: Unauthorized
        '500':
          description: Failed to read balance from storage

  /wallet/send:
    post:
      tags:
        - Wallet
      summary: Send transaction
      description: |
        Send a transaction (requires authentication and request signing).
        When **submesh** profiles are loaded on the node, **422** is returned if **fee** and **geotag** do not match any submesh or the signed transaction JSON exceeds the matched profile's **max_tx_size**.
      operationId: sendTransaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient
                - amount
              properties:
                recipient:
                  type: string
                  description: Recipient wallet address
                amount:
                  type: number
                  format: float
                  minimum: 0
                  description: Transaction amount
                fee:
                  type: number
                  format: float
                  description: Transaction fee
                geotag:
                  type: string
                  description: Geographic tag
                parent_cells:
                  type: array
                  items:
                    type: string
                  description: Parent cell IDs
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                    example: "pending"
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '422':
          description: Submesh policy rejected (fee/geotag no match or transaction JSON exceeds max_tx_size when submesh_config is loaded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                submeshRoute:
                  summary: No matching submesh
                  value:
                    error: Unprocessable Entity
                    message: 'no matching submesh for fee and geotag: no matching submesh for fee 0.1000 and geoTag '
                    status: 422
                submeshSize:
                  summary: Payload too large
                  value:
                    error: Unprocessable Entity
                    message: 'payload exceeds submesh max_tx_size: transaction size 5000 exceeds submesh "micropayments" max_tx_size 1024'
                    status: 422
        '503':
          $ref: '#/components/responses/WalletService503'

  /wallet/submit-signed:
    post:
      tags:
        - Wallet
      summary: Submit a self-custody signed transaction (v0.4.0)
      description: |
        Accepts a fully **client-signed** `wallet.TransactionData` envelope and applies the balance change iff the envelope's ML-DSA-87 signature verifies against its own embedded `public_key` AND `sender == hex(sha256(public_key))`.

        Use this endpoint instead of `/wallet/send` when the signer is **NOT** the validator's own wallet — i.e. for the browser wallet at `qsdm.tech/wallet/` (Send tab) or any third-party SDK that holds the user's ML-DSA-87 private key locally. The endpoint is intentionally **unauthenticated**: the cryptographic identity IS the envelope's `public_key`, and demanding a JWT on top would force the caller to reveal a server-side session identity that has no bearing on the on-chain debit. Per-IP rate-limit caps at 10 requests/min, matching `/wallet/send`.

        ## Canonical signing payload

        The signature is computed over the JSON-marshalled `wallet.TransactionData` with `signature` and `public_key` fields cleared (`signature` emits as `""`; `public_key` is omitted via `omitempty`). Marshalling uses Go's `encoding/json` default struct-order field emission. The reference browser-wallet WASM helper (`qsdm_wallet_sign_transaction`) is the source of truth — it runs Go's own `json.Marshal` to avoid float-format drift between Go and JavaScript.

        ## Idempotency

        Idempotent on `tx_id`. A duplicate POST returns **409 Conflict** with `status: "duplicate"` and echoes the original `transaction_id`. The handler is safe to retry.

        ## Server-side invariants enforced

        On every call the handler enforces:

        1. **Sender binding** — `sender == hex(sha256(public_key))`. Mismatch → 400, `qsdm_wallet_send_total{result="sender_mismatch"}`.
        2. **Signature verification** — ML-DSA-87 verified against the envelope's own `public_key` with the canonical payload above. Mismatch → 422, `result="signature_invalid"`.
        3. **Balance pre-flight** — `storage.GetBalance(sender) ≥ amount + fee`. Shortfall → 402, `result="insufficient_balance"`.
        4. **Idempotency** — `storage.GetTransaction(tx_id)` hit → 409 + `status="duplicate"`, `result="duplicate"`.
        5. **Submesh policy** — same gate as `/wallet/send` (`enforceSubmeshWalletSend`). Reject → 422, increments `qsdm_submesh_api_wallet_reject_*`.

        ## Known v0.4.0 gaps

        v0.4.0 ships with two intentional gaps (tracked in `pkg/audit/checklist.go::api-06` and `QSDM/docs/docs/V040_WALLET_SEND_DESIGN.md`):

        1. **No per-account nonce** → cross-`tx_id` replay possible if the caller controls the timestamp inside the `tx_id` seed. Same-`tx_id` replay IS prevented via the 409 path. Fix planned for v0.4.1 (per-sender monotonically-increasing nonce).
        2. **Non-atomic debit** → `storage.UpdateBalance` warns-and-proceeds on negative balance, so a concurrent race between two simultaneous submit-signed calls from the same sender can drop the on-disk balance below zero. Fix planned for v0.4.1 (single-transaction atomic debit/credit with `CHECK` constraint).

        Both gaps must close before `mining-05` (incentivised testnet) exposure. They are **not a regression** — `/wallet/send` has the same posture today — but they ARE blockers for public balance-bearing endpoint exposure on a balance-bearing chain.
      operationId: submitSignedTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - sender
                - recipient
                - amount
                - public_key
                - signature
                - timestamp
              properties:
                id:
                  type: string
                  description: |
                    Transaction ID — first 16 hex chars (8 bytes) of `sha256(sender || recipient || timestamp_ns)`. Must be unique per logical transaction; reuse triggers the 409 idempotency path.
                  example: "f2a8b4c6d8e1f0a3b5c7d9e2f4a6b8c0"
                sender:
                  type: string
                  description: |
                    Sender address — `hex(sha256(public_key))`, 64 hex chars. MUST match the envelope's `public_key` field byte-exactly or the handler returns 400.
                  example: "605ab7550bd6c74ce3e5b394c1f6334cea0f6e2951938ae7fc5c775a7e1ac7e2"
                recipient:
                  type: string
                  description: Recipient address — `hex(sha256(recipient_public_key))`, 64 hex chars.
                amount:
                  type: number
                  format: float
                  minimum: 0.00000001
                  description: Transaction amount in CELL. Minimum 1 dust = 10^-8 CELL.
                fee:
                  type: number
                  format: float
                  minimum: 0
                  description: Transaction fee in CELL. Set to 0 to omit; submesh routing may still reject a 0-fee envelope on a fee-gated submesh.
                geotag:
                  type: string
                  description: ISO-3166-1 geographic tag used by the submesh router. Optional but accepted by every submesh profile.
                  example: "US"
                parent_cells:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                  description: Parent cell tx_ids (alphanumeric, 16–128 chars each). Two or more recommended for PoE consensus parents.
                signature:
                  type: string
                  description: |
                    Hex-encoded ML-DSA-87 signature (9254 hex chars = 4627 raw bytes) over the canonical payload described above. Produced by `qsdm_wallet_sign_transaction` (browser WASM) or `qsdmcli wallet sign-tx` (CLI).
                public_key:
                  type: string
                  description: Hex-encoded ML-DSA-87 packed public key (5184 hex chars = 2592 raw bytes).
                timestamp:
                  type: string
                  format: date-time
                  description: RFC 3339 UTC timestamp.
                  example: "2026-05-13T15:34:56Z"
      responses:
        '200':
          description: Transaction accepted and stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Echo of the envelope's `id` field.
                  status:
                    type: string
                    enum: ["accepted"]
                  broadcast:
                    type: string
                    enum: ["p2p", "local-only"]
                    description: Indicates whether the p2p tx broadcaster was wired. `local-only` is normal for single-node test deployments.
              examples:
                accepted:
                  summary: Accepted (p2p broadcast)
                  value:
                    transaction_id: "f2a8b4c6d8e1f0a3b5c7d9e2f4a6b8c0"
                    status: "accepted"
                    broadcast: "p2p"
        '400':
          description: |
            Validation failure. Common reasons:
            * Malformed envelope JSON (`invalid envelope: ...`)
            * `sender != hex(sha256(public_key))` (`sender does not match hex(sha256(public_key))`)
            * Address/amount/fee/geotag/parent_cells shape rejected by the input validator
            * `public_key` or `signature` not valid hex
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: |
            Insufficient balance — `storage.GetBalance(sender) < amount + fee`. The body reports both numbers verbatim so the client can render the shortfall.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                shortfall:
                  summary: Sender lacks funds
                  value:
                    error: Payment Required
                    message: "insufficient balance: have 0.5, need 1.01"
                    status: 402
        '405':
          description: Method not allowed — only POST is accepted.
        '409':
          description: |
            Duplicate `tx_id` — the envelope has already been stored. Body echoes the original `transaction_id` and reports `status: "duplicate"`. The handler is idempotent; treat the 409 as success-equivalent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                    enum: ["duplicate"]
        '422':
          description: |
            * **Signature invalid** — the ML-DSA-87 signature does not verify against the envelope's `public_key` over the canonical payload. Increments `qsdm_wallet_send_total{result="signature_invalid"}`.
            * **Submesh route rejected** — fee/geotag combination doesn't match any loaded submesh profile, or the signed envelope exceeds the matched profile's `max_tx_size`. Same posture as `/wallet/send`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Storage write failed.
        '503':
          $ref: '#/components/responses/WalletService503'

  /wallet/address:
    get:
      tags:
        - Wallet
      summary: Get wallet address
      description: Get the authenticated user's wallet address
      operationId: getAddress
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Address retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
        '401':
          description: Unauthorized
        '503':
          $ref: '#/components/responses/WalletService503'

  /wallet/mint:
    post:
      tags:
        - Wallet
      summary: '[REMOVED in v0.3.3] Mint main coin ($CELL) — now returns 410 Gone'
      deprecated: true
      description: |
        **Removed in v0.3.3 (Session 91).** This endpoint was a non-functional
        stub in v0.3.2 and earlier: it accepted `{recipient, amount}`, returned
        HTTP 200 with `status:"minted"`, but **never credited the recipient's
        balance** — there was no code path from this handler to the wallet
        service's `AddBalance` operation. A subsequent
        `GET /wallet/balance?address=<recipient>` always returned 0.

        The handler now returns **HTTP 410 Gone** with a JSON body carrying a
        structured `migration` block. Callers should switch to:

        * **New-operator funding:** `POST /wallet/send` from an existing
          operator (peer transfer; see `MINER_QUICKSTART.md` Appendix B), or
          wait for the public incentivised testnet (tracked as `mining-05`
          in `RELEASE_NOTES_v0.3.0.md`).
        * **Named token mint:** `POST /tokens/mint` is the working,
          wallet-service-backed mint path for secondary tokens.

        The `qsdm_wallet_mint_total{result="gone"}` Prometheus counter
        increments for every call to this path on v0.3.3+ nodes — a rising
        value indicates a misconfigured caller that should be migrated.
      operationId: mintMainCoin
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: 'Body is ignored — handler always returns 410 Gone.'
      responses:
        '410':
          description: Endpoint removed in v0.3.3 — see `migration` field for next steps.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: gone
                  reason:
                    type: string
                  migration:
                    type: object
                    properties:
                      new_operator_funding:
                        type: string
                      named_token_minting:
                        type: string
                      public_testnet:
                        type: string
        '405':
          description: Method not allowed (only POST is routed; GET/PUT/DELETE return 405 before the 410 evaluation).

  /tokens/mint:
    post:
      tags:
        - Wallet
      summary: Mint a named token
      description: |
        Mints a secondary token (e.g. $JOLLY). **NVIDIA-lock** and **submesh** **422** rules match **`/wallet/mint`**.
      operationId: mintToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token_symbol
                - recipient
                - amount
              properties:
                token_symbol:
                  type: string
                recipient:
                  type: string
                amount:
                  type: number
                  format: float
                  minimum: 0
      responses:
        '200':
          description: Mint recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  token_symbol:
                    type: string
                  amount:
                    type: number
                  recipient:
                    type: string
                  status:
                    type: string
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: NVIDIA-lock blocked
        '422':
          $ref: '#/components/responses/SubmeshPolicy422'

  /tokens/create:
    post:
      tags:
        - Wallet
      summary: Create a new token definition
      description: |
        Registers token metadata on the ledger. **NVIDIA-lock** applies; **422** when submesh **max_tx_size** cap is exceeded for the stored JSON.
      operationId: createToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - symbol
                - decimals
                - total_supply
              properties:
                name:
                  type: string
                symbol:
                  type: string
                decimals:
                  type: integer
                  minimum: 0
                  maximum: 18
                total_supply:
                  type: number
                  format: float
                description:
                  type: string
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_id:
                    type: string
                  name:
                    type: string
                  symbol:
                    type: string
                  decimals:
                    type: integer
                  total_supply:
                    type: number
                  status:
                    type: string
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: NVIDIA-lock blocked
        '422':
          $ref: '#/components/responses/SubmeshPolicy422'

  /transactions:
    get:
      tags:
        - Transactions
      summary: List transactions
      description: Get recent transactions for an address
      operationId: listTransactions
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of transactions to return (default: 50, max: 1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Transactions retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      type: object
                  limit:
                    type: integer
                  count:
                    type: integer
        '401':
          description: Unauthorized
        '501':
          description: Not implemented (storage backend doesn't support this)

  /transactions/{txId}:
    get:
      tags:
        - Transactions
      summary: Get transaction by ID
      description: Retrieve a specific transaction by its ID
      operationId: getTransaction
      security:
        - bearerAuth: []
      parameters:
        - name: txId
          in: path
          required: true
          description: Transaction ID
          schema:
            type: string
      responses:
        '200':
          description: Transaction retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  sender:
                    type: string
                  recipient:
                    type: string
                  amount:
                    type: number
                  timestamp:
                    type: string
        '401':
          description: Unauthorized
        '404':
          description: Transaction not found
        '501':
          description: Not implemented (storage backend doesn't support this)

  /validator/validate:
    post:
      tags:
        - Validator
      summary: Validate transaction
      description: Validate a transaction using 3D mesh validation
      operationId: validateTransaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transaction_id
                - parent_cells
                - data
              properties:
                transaction_id:
                  type: string
                parent_cells:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      data:
                        type: string
                        format: byte
                        description: Base64-encoded data
                data:
                  type: string
                  format: byte
                  description: Base64-encoded transaction data
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

components:
  responses:
    SubmeshPolicy422:
      description: Submesh strictest max_tx_size exceeded for this ledger payload (when submesh profiles are loaded)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    WalletService503:
      description: |
        The node's wallet service did not initialize at startup (CGO wallet path). Check server logs — often liboqs/OpenSSL or key material.
        **POST /wallet/create** does not use this path; it creates a wallet per request and may return **500** instead.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Service Unavailable
            message: wallet service not available (wallet did not initialize at node startup; check logs — e.g. liboqs/OpenSSL on CGO builds)
            status: 503

  parameters:
    NgcIngestSecretPrimary:
      name: X-QSDM-NGC-Secret
      in: header
      required: false
      schema:
        type: string
      description: NGC ingest shared secret (required for challenge/proof routes when ingest is enabled).
    NgcIngestSecretLegacy:
      name: X-QSDM-NGC-Secret
      in: header
      required: false
      schema:
        type: string
      description: Legacy alias for X-QSDM-NGC-Secret.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token signed with CRYSTALS-Dilithium (quantum-safe).
        Token format: base64(claims) + "." + base64(signature)
        
        For POST/PUT/DELETE requests, also include:
        - X-Timestamp: Unix timestamp (seconds)
        - X-Nonce: Unique nonce (32 bytes, base64)
        - X-Signature: Request signature (base64, quantum-safe)

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status:
          type: integer

