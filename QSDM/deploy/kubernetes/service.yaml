apiVersion: v1
kind: Service
metadata:
  name: qsdm-service
  namespace: qsdm
  labels:
    app: qsdm
spec:
  type: ClusterIP
  ports:
  - name: network
    port: 4001
    targetPort: network
    protocol: TCP
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  - name: dashboard
    port: 8081
    targetPort: dashboard
    protocol: TCP
  - name: logviewer
    port: 9000
    targetPort: logviewer
    protocol: TCP
  selector:
    app: qsdm
    component: node
  clusterIP: None  # Headless service for StatefulSet

---
apiVersion: v1
kind: Service
metadata:
  name: qsdm-dashboard
  namespace: qsdm
  labels:
    app: qsdm
    component: dashboard
spec:
  type: LoadBalancer
  ports:
  - name: dashboard
    port: 8081
    targetPort: dashboard
    protocol: TCP
  selector:
    app: qsdm
    component: node

---
apiVersion: v1
kind: Service
metadata:
  name: qsdm-api
  namespace: qsdm
  labels:
    app: qsdm
    component: api
spec:
  type: LoadBalancer
  ports:
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  selector:
    app: qsdm
    component: node

