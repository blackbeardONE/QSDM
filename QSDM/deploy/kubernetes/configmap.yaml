apiVersion: v1
kind: ConfigMap
metadata:
  name: qsdm-config
  namespace: qsdm
data:
  # Network configuration
  network_port: "4001"
  bootstrap_peers: ""
  
  # Storage configuration
  storage_type: "sqlite"
  sqlite_path: "/app/data/qsdmplus.db"
  
  # Monitoring configuration
  dashboard_port: "8081"
  log_viewer_port: "9000"
  log_file: "/app/logs/qsdmplus.log"
  log_level: "INFO"
  
  # API configuration
  api_port: "8080"
  enable_tls: "false"
  # Per-client sliding window (env API_RATE_LIMIT_* / QSDMPLUS_API_RATE_LIMIT_*)
  api_rate_limit_max: "100"
  api_rate_limit_window: "1m"
  
  # Performance configuration
  transaction_interval: "1s"
  health_check_interval: "30s"

