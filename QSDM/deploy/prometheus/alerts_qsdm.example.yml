# Example Prometheus alerting rules for QSDM dashboard metrics (qsdm_*).
# Load with rule_files in prometheus.yml, or use a Prometheus Operator PrometheusRule CRD.
#
# Adjust thresholds and `for:` to your fleet; many counters are monotonic — use rate().

groups:
  - name: qsdm-nvidia-lock
    rules:
      - alert: QSDMNvidiaLockHTTPBlocksSpike
        expr: rate(qsdm_nvidia_lock_http_blocks_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated NVIDIA-lock HTTP blocks"
          description: "State-changing API calls are returning 403 from NVIDIA-lock faster than threshold."

      - alert: QSDMNvidiaLockP2PRejects
        expr: increase(qsdm_nvidia_lock_p2p_rejects_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P2P transactions rejected by NVIDIA-lock gate"
          description: "nvidia_lock_gate_p2p is dropping txs without a qualifying proof."

      - alert: QSDMNGCChallengeRateLimited
        expr: increase(qsdm_ngc_challenge_rate_limited_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Many 429s on ngc-challenge"
          description: "Sidecars or clients may be polling challenge too aggressively; check Retry-After and jitter."

      - alert: QSDMNGCProofIngestRejectBurst
        expr: sum(increase(qsdm_ngc_proof_ingest_rejected_total[10m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Many rejected POSTs to /monitoring/ngc-proof"
          description: "Check sidecar logs, HMAC/nonce alignment, body size, and unauthorized probes; see qsdm_ngc_proof_ingest_rejected_total by reason."

  # -----------------------------------------------------------------
  # Submesh policy gate (per-tx route + size enforcement)
  # -----------------------------------------------------------------
  # The submesh policy gate sits UPSTREAM of validation
  # (pkg/submesh/manager.go via cmd/qsdm/transaction/
  # transaction.go for libp2p, pkg/api/handlers.go for
  # HTTP). Transactions that fail the gate are dropped
  # before validation runs — they don't increment
  # qsdm_transactions_invalid_total. Two failure modes,
  # captured by two error types:
  #
  #   ErrSubmeshNoRoute:
  #     fee/geotag did not match any submesh route
  #     loaded from cfg.SubmeshConfigPath. Most often
  #     a client-side config drift (fee tier client
  #     thinks valid is no longer in the loaded
  #     submesh_config) OR validator-side reload that
  #     tightened the route set.
  #
  #   ErrSubmeshPayloadTooLarge:
  #     route matched but the message exceeded the
  #     matched submesh's max_tx_size. Most often a
  #     client-side framing change (new field /
  #     larger encoding) OR validator-side reload
  #     that lowered max_tx_size.
  #
  # Five counters distinguish the path (libp2p vs API
  # wallet vs API privileged) and the reason (route vs
  # size). Privileged paths use the strictest
  # max_tx_size across all submeshes and have no route
  # check.
  - name: qsdm-submesh
    rules:
      - alert: QSDMSubmeshP2PRejects
        # ANY route OR size reject in 15m, sustained 5m.
        # Threshold is intentionally aggressive: libp2p
        # rejects are silent (fire-and-forget; producer
        # gets no feedback), so the alert IS the
        # operator's only signal that a population of
        # peers is being permanently dropped at the gate.
        expr: increase(qsdm_submesh_p2p_reject_route_total[15m]) > 0 or increase(qsdm_submesh_p2p_reject_size_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          # Mode A in SUBMESH_POLICY_INCIDENT.md — P2P
          # path. Triage matrix in §3.1 maps the dominant
          # counter ({route_total only, size_total only,
          # both}) and the source distribution ({single
          # peer, fleet-wide}) to one of {client-config
          # drift, validator-config reload regression,
          # in-flight client migration}. The runbook
          # explicitly says NOT to silence the alert
          # without identifying the producer — libp2p has
          # no client-visible response, so silencing
          # leaves a population permanently unable to
          # participate.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SUBMESH_POLICY_INCIDENT.md#31-mode-a--qsdmsubmeshp2prejects"
          summary: "{{ $labels.instance }}: P2P transactions dropped by submesh policy gate"
          description: |
            qsdm_submesh_p2p_reject_route_total or
            qsdm_submesh_p2p_reject_size_total has been
            incrementing for 5m+. P2P txs are dropped
            silently (libp2p fire-and-forget); producers
            have no client-visible signal that their
            txs are being rejected, so the alert IS the
            operator's only handle.
            Triage:
              - Decompose by reason:
                rate(qsdm_submesh_p2p_reject_route_total[15m])
                rate(qsdm_submesh_p2p_reject_size_total[15m])
              - route_total dominant ⇒ client fee/geotag
                drift OR validator submesh_config reload
                tightened routes.
              - size_total dominant ⇒ client framing
                drift OR max_tx_size lowered on the
                matched submesh.
              - Cross-check qsdm_quarantine_submeshes:
                sustained policy hits eventually
                trigger per-submesh isolation
                (QUARANTINE_INCIDENT.md cascade).

      - alert: QSDMSubmeshAPISustained422
        # ≥5 API rejects (any of wallet route + wallet
        # size + privileged size) over 10m, sustained
        # 5m. Summed-counter expression with a small
        # threshold gives noise immunity: a single
        # mistuned client doesn't trip it but a
        # sustained mis-rollout does. API rejects ARE
        # client-visible (HTTP 422), so unlike Mode A
        # the producer knows — but if they're retrying
        # without fixing the underlying cause, the
        # alert paints.
        expr: |
          (
            increase(qsdm_submesh_api_wallet_reject_route_total[10m])
            + increase(qsdm_submesh_api_wallet_reject_size_total[10m])
            + increase(qsdm_submesh_api_privileged_reject_size_total[10m])
          ) >= 5
        for: 5m
        labels:
          severity: warning
        annotations:
          # Mode B in SUBMESH_POLICY_INCIDENT.md — API
          # path. Triage matrix in §3.2 forks on the
          # dominant counter: wallet_reject_route_total
          # ⇒ stale wallet client, wallet_reject_size_total
          # ⇒ wallet release added a memo/metadata field,
          # privileged_reject_size_total ⇒ service-account
          # producer hit a payload-size regression. The
          # runbook explicitly anti-patterns raising the
          # privileged max_tx_size to silence one bad
          # producer (it's a global change affecting
          # every privileged caller).
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SUBMESH_POLICY_INCIDENT.md#32-mode-b--qsdmsubmeshapisustained422"
          summary: "{{ $labels.instance }}: sustained HTTP 422s from submesh policy gate"
          description: |
            ≥5 API submesh-policy rejects over 10m,
            summed across qsdm_submesh_api_wallet_reject_*
            and qsdm_submesh_api_privileged_reject_size_total.
            API clients receive HTTP 422 directly so the
            producer knows; the alert paints because
            they're retrying without fixing the
            underlying cause.
            Triage:
              - Decompose by endpoint:
                rate(qsdm_submesh_api_wallet_reject_route_total[10m])
                rate(qsdm_submesh_api_wallet_reject_size_total[10m])
                rate(qsdm_submesh_api_privileged_reject_size_total[10m])
              - wallet_route ⇒ stale wallet client OR
                submesh_config dropped a route the
                wallet was using.
              - wallet_size ⇒ wallet release attaching
                memos / metadata OR max_tx_size lowered.
              - privileged_size ⇒ mint / token-create
                caller above the strictest cap (most
                often a service-account producer
                payload-size regression).

  - name: qsdm-throughput
    rules:
      - alert: QSDMNoTransactionsStored
        expr: rate(qsdm_transactions_stored_total[30m]) == 0 and rate(qsdm_transactions_processed_total[30m]) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Transactions processed but none stored"
          description: "Possible validation/storage issue; verify logs and NVIDIA-lock policy."

  # -----------------------------------------------------------------
  # Trust / attestation transparency (Major Update §8.5)
  # -----------------------------------------------------------------
  # These alerts consume the canonical qsdm_* series. They are safe to
  # load on legacy-only or dual-emit scrapers because dual-emit
  # (pkg/monitoring/prometheus_prefix_migration.go) publishes both
  # prefixes by default. If your fleet has already flipped to qsdm_*
  # only, nothing changes; if it is still on qsdm_* only, swap the
  # prefix in expr: once.
  #
  # The /api/v1/trust/attestations/summary HTTP endpoint is NOT itself
  # a Prometheus metric, so we alert on the underlying counter
  # (qsdm_ngc_proof_ingest_accepted_total) instead: if no accepted
  # proof bundle arrived for 20 min, the summary's "attested" ratio
  # will have fallen to 0 regardless of how many validators are live,
  # which is the operator-visible symptom.
  - name: qsdm-trust-transparency
    rules:
      - alert: QSDMTrustNoAttestationsAccepted
        # Rate == 0 across a 20-minute window = no sidecar (or any
        # peer) is successfully attesting. Because the freshness window
        # on /trust/attestations/summary is 15 m by default, 20 m
        # guarantees the transparency badge has already flipped to
        # degraded before this alert fires.
        expr: sum(rate(qsdm_ngc_proof_ingest_accepted_total[20m])) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          # Mode A is the entry point of the canonical
          # trust-degradation cascade — sidecar stops
          # posting → counter flatlines → service status
          # degraded → newest sample ages out → attested
          # drops below floor. The runbook's §4 cascade
          # map walks the typical 30–40m progression so
          # an operator hit by 4 alerts at once knows
          # they're one incident.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#31-mode-a--qsdmtrustnoattestationsaccepted"
          summary: "No accepted NGC proof bundles for 20 minutes"
          description: |
            /api/v1/trust/attestations/summary will report attested=0 until a
            miner or sidecar posts a fresh bundle. Common causes:
              - The refresh loop (Windows Scheduled Task "QSDM-NGC-Attest",
                apps/qsdm-nvidia-ngc/scripts/attest-from-env-file.ps1)
                stopped because the host is off / the secret rotated.
              - Sidecar containers (docker compose --profile gpu) crashed;
                check qsdm_ngc_proof_ingest_rejected_total by reason.
              - The node has QSDM_NGC_INGEST_SECRET unset, which
                disables the ingest route; the counter then stays pinned
                at zero by design.

      - alert: QSDMTrustIngestRejectRateElevated
        # Accepted vs rejected ratio: if rejects outpace accepts over 10 m,
        # something is misaligned (secret rotated on one side, clock skew,
        # replay-nonce expired). Use >1.0 so a single rejected probe does
        # not fire the page.
        expr: |
          sum(rate(qsdm_ngc_proof_ingest_rejected_total[10m]))
          >
          1 + sum(rate(qsdm_ngc_proof_ingest_accepted_total[10m]))
        for: 10m
        labels:
          severity: warning
        annotations:
          # Mode B's triage is reason-driven: hmac_mismatch
          # = secret rotation (operationally most common),
          # invalid_nonce = clock skew or slow network,
          # unauthorized = third-party probe. The runbook
          # table maps every closed-enum reason to a
          # cause and an action.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#32-mode-b--qsdmtrustingestrejectrateelevated"
          summary: "NGC ingest rejections outpacing acceptances"
          description: |
            Break out qsdm_ngc_proof_ingest_rejected_total by reason.
            "hmac_mismatch" / "invalid_nonce" usually means a secret
            drifted between node and sidecar; "unauthorized" is a third
            party probing the endpoint.

  # -----------------------------------------------------------------
  # Trust / attestation redundancy (direct gauges, Major Update §8.5.4)
  # -----------------------------------------------------------------
  # The rules above alert on the underlying counter (proofs flowing at
  # all). These rules alert on the aggregator-level view: how many
  # *distinct* attestation sources are currently inside fresh_within,
  # and how fresh the newest one is. Both are exposed by the
  # TrustMetricsCollector in pkg/api/trust_metrics.go and are the exact
  # numbers rendered on the qsdm.tech/trust.html pill.
  #
  # Mirror of the external CI side: .github/workflows/trustcheck-external.yml
  # passes --min-attested 2 to cmd/trustcheck. These rules enforce the
  # same floor from inside Prometheus, so Alertmanager pages whether
  # the operator's CI runs fire or not (or when CI is off-hours).
  #
  # IMPORTANT: every expression is gated on qsdm_trust_warm == 1. The
  # aggregator publishes 0 for attested/ratio/last_attested_seconds
  # during the ~1 Refresh tick of warm-up after a restart, and a naive
  # "attested < 2" rule would fire on every redeploy. Gating on warm
  # lets redeploys complete silently and only alerts when a warm
  # aggregator reports insufficient redundancy.
  - name: qsdm-trust-redundancy
    rules:
      - alert: QSDMTrustAttestationsBelowFloor
        # One-source operation is legitimate for a single-node bring-up
        # but once you have stood up N >= 2 sources you want a page the
        # moment that number drops. 10m of for: gives a sidecar one
        # full attestation cadence to recover before pinging a human.
        expr: qsdm_trust_warm == 1 and qsdm_trust_attested < 2
        for: 10m
        labels:
          severity: warning
        annotations:
          # Mode C is the internal twin of the external
          # cmd/trustcheck --min-attested 2 CI probe. The
          # runbook surfaces the LocalDistinctAttestationSource
          # NodeID-collision case explicitly — two sidecars
          # with the same QSDM_NGC_PROOF_NODE_ID dedupe to
          # one source, which can fire this alert even when
          # both sidecars are healthy and posting.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#33-mode-c--qsdmtrustattestationsbelowfloor"
          summary: "{{ $labels.instance }}: only {{ $value }} fresh attestation source(s)"
          description: |
            /api/v1/trust/attestations/summary reports attested={{ $value }}
            (< 2). The external GitHub-Actions probe (.github/workflows/
            trustcheck-external.yml with --min-attested 2) will also fail
            on its next schedule. Common causes:
              - One of the sidecars (Windows PC / VPS / OCI) is offline
                or its systemd timer stopped.
              - QSDM_NGC_PROOF_NODE_ID collision between sidecars
                (they then collapse to a single attestation in the
                aggregator — see pkg/api/handlers_trust.go
                LocalDistinctAttestationSource).
              - A rotated QSDM_NGC_INGEST_SECRET on one side; cross-
                reference qsdm_ngc_proof_ingest_rejected_total by reason.

      - alert: QSDMTrustNGCServiceDegraded
        # Mirrors the string field ngc_service_status on the summary
        # JSON. 0 here means either "degraded" or "outage". The
        # aggregator sets this on its own classification of proof
        # arrival cadence, so it fires before attested hits 0 in a
        # slow-death scenario.
        expr: qsdm_trust_warm == 1 and qsdm_trust_ngc_service_healthy == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          # Mode D is the leading-edge alert in the
          # cascade — the aggregator's ngc_service_status
          # classifier flips before the gauges underneath
          # do, so this fires while modes C/E are still
          # quiet. The runbook treats Mode D as a
          # pre-warning trigger to identify the upstream
          # cause (Modes A/B) rather than a thing to
          # mitigate directly.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#34-mode-d--qsdmtrustngcservicedegraded"
          summary: "{{ $labels.instance }}: NGC service status is not 'healthy'"
          description: |
            /api/v1/trust/attestations/summary ngc_service_status is
            either "degraded" or "outage" for 10+ minutes. The trust
            pill on qsdm.tech will be amber/red. Check sidecar logs
            and qsdm_ngc_proof_ingest_rejected_total first.

      - alert: QSDMTrustLastAttestedStale
        # Belt and braces for the attested<2 rule: even if we have two
        # sources, if the newest one is >30m old the aggregator will
        # eventually tip to attested=0 (fresh_within defaults to 15m).
        # Alert halfway through the degradation window so an operator
        # can act before the summary flips.
        #
        # time() - 0 during warm-up is a huge number, so we gate on
        # qsdm_trust_last_attested_seconds > 0 as well.
        expr: |
          qsdm_trust_warm == 1
          and qsdm_trust_last_attested_seconds > 0
          and (time() - qsdm_trust_last_attested_seconds) > 1800
        for: 5m
        labels:
          severity: warning
        annotations:
          # Mode E is the belt-and-braces alert: even if
          # attested >= 2, a sample older than twice
          # fresh_within means the source is about to age
          # out. Threshold is calibrated to fire halfway
          # through the degradation window so an operator
          # has 30 minutes to act before Mode C fires.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#35-mode-e--qsdmtrustlastattestedstale"
          summary: "{{ $labels.instance }}: newest attestation is >30m old"
          description: |
            Newest attestation timestamp is {{ $value | humanizeDuration }}
            ago (> 30m). fresh_within is 15m by default, so the summary
            will flip to attested=0 shortly if no new proof arrives.
            Check sidecar timers and QSDM_NGC_INGEST_SECRET alignment.

      - alert: QSDMTrustAggregatorStale
        # qsdm_trust_last_checked_seconds is the last Refresh() tick.
        # If it stops advancing, the aggregator goroutine is wedged
        # (not the proofs themselves — those are a separate path).
        # Default refresh_interval is 10s, so >2m with no tick is
        # unambiguously broken. Warm gate for the same reason as above.
        expr: |
          qsdm_trust_warm == 1
          and qsdm_trust_last_checked_seconds > 0
          and (time() - qsdm_trust_last_checked_seconds) > 120
        for: 2m
        labels:
          severity: critical
        annotations:
          # Mode F is the only critical-severity alert in
          # the trust group. The aggregator goroutine is
          # wedged — Refresh() ticks have stopped, so the
          # Trust Panel and qsdm.tech badge can stay green
          # while the pipeline is silently broken (false-
          # confidence — the worst class of trust failure).
          # Runbook calls out: capture a goroutine dump
          # BEFORE restarting (state will be lost on
          # restart, and the wedge is likely
          # reproducible).
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#36-mode-f--qsdmtrustaggregatorstale"
          summary: "{{ $labels.instance }}: TrustAggregator Refresh() is stuck"
          description: |
            qsdm_trust_last_checked_seconds has not advanced in >2m
            but refresh_interval is {{ with query "scalar(qsdm_trust_warm)" }}10s{{ end }}
            by default. The aggregator ticker is wedged (probably a
            blocked peer provider call or storage read). /api/v1/trust/
            attestations/summary will go stale from a user perspective
            regardless of how many proofs are arriving. Restart the
            qsdm service and capture a goroutine dump.

  # -----------------------------------------------------------------
  # Quarantine subsystem (direct gauges, mirror of trust pattern)
  # -----------------------------------------------------------------
  # Companions to qsdm-submesh above. The qsdm-submesh rules
  # alert on transaction-level rejection counters ("is the submesh
  # policy ever kicking in?"). These rules alert on the aggregate
  # quarantine state ("how many submeshes are currently isolated?") by
  # consuming the qsdm_quarantine_* gauges emitted by
  # pkg/quarantine/metrics.go. Together with the trust gauges above,
  # Alertmanager sees both the attestation denominator and the fraction
  # of the mesh that is in penalty — the two numbers that most often
  # move in opposite directions during an incident.
  #
  # No warm-gate is needed here: the QuarantineManager is fully live
  # from process start (no Refresh() equivalent), so zero values at
  # t=0 are literally correct. The natural-zero denominator case is
  # handled inside the collector (ratio returns 0 when tracked==0),
  # so no alert can fire on an empty fleet.
  - name: qsdm-quarantine
    rules:
      - alert: QSDMQuarantineAnySubmesh
        # A single quarantined submesh for 10+ minutes is worth a
        # page: auto-recovery (pkg/quarantine/auto_recovery.go) only
        # activates when wired, and manual RemoveQuarantine is a
        # decision a human should be making. This is intentionally
        # chatty in multi-tenant deployments — tune the for: per env.
        expr: qsdm_quarantine_submeshes > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          # Mode A is the per-submesh quarantine page —
          # one or more submeshes have quarantined[k]=true
          # for 10+ min. Runbook walks the closed-enum
          # reject-reason → cause table. Auto-recovery is
          # intentionally OFF in production (human review
          # is the safer default), so the alert clears
          # when the operator either fixes the upstream
          # cause or calls RemoveQuarantine after
          # confirming the policy hit has stopped.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/QUARANTINE_INCIDENT.md#31-mode-a--qsdmquarantineanysubmesh"
          summary: "{{ $labels.instance }}: {{ $value }} submesh(es) currently quarantined"
          description: |
            The QuarantineManager has {{ $value }} submeshes with
            quarantined[k]=true for 10+ minutes. Inspect
            qsdm_submesh_p2p_reject_* counters and validator logs
            for the offending submesh key. Resolve by fixing the
            invalid-tx source, or call QuarantineManager.RemoveQuarantine
            after confirming the underlying cause is cleared.

      - alert: QSDMQuarantineMajorityIsolated
        # Ratio-based escalation: if more than half of observed
        # submeshes are quarantined, this is no longer a local policy
        # hit but a systemic event (bad software rollout, rotated key,
        # clock skew). The tracked>=4 guard stops flap on tiny fleets
        # where one bad submesh out of two already crosses 0.5.
        expr: |
          qsdm_quarantine_submeshes_tracked >= 4
          and qsdm_quarantine_submeshes_ratio > 0.5
        for: 15m
        labels:
          severity: critical
        annotations:
          # Mode B is critical-severity because >50% of
          # tracked submeshes simultaneously quarantined
          # is, by construction, NOT a per-submesh
          # problem — single-rig issues affect one submesh
          # at a time. The runbook's §3.2 decision tree
          # walks the "what changed in the last hour"
          # check (binary release / config push / NTP
          # event / key rotation) before any
          # RemoveQuarantine call, because a bulk-clear
          # without root cause re-fires within 15 min
          # and loses the diagnostic state of which
          # submeshes triggered when.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/QUARANTINE_INCIDENT.md#32-mode-b--qsdmquarantinemajorityisolated"
          summary: "{{ $labels.instance }}: majority of tracked submeshes quarantined ({{ $value | humanizePercentage }})"
          description: |
            {{ $value | humanizePercentage }} of the submeshes this
            node has observed are currently quarantined. This is
            almost never a per-submesh problem — suspect a bad
            rollout, a policy-threshold misconfiguration, or a
            validator-side bug mis-classifying valid transactions.
            Cross-check qsdm_quarantine_threshold against the
            rollout plan before unwinding quarantines.

  # -----------------------------------------------------------------
  # v2 mining — slashing
  # -----------------------------------------------------------------
  # Consumes the qsdm_slash_* counters emitted by
  # pkg/monitoring/slashing_metrics.go (recorder pattern, recorded
  # from pkg/chain/slash_apply.go). Together with the enrollment
  # group below, these are the primary economic-safety pages for
  # the v2 NVIDIA-locked mining protocol.
  #
  # Threshold rationale: a healthy fleet emits a handful of slashes
  # per day at most — verifier disagreement rate floor + double-mine
  # accidents combined. Anything above that signals coordinated
  # cheating (which we WANT to slash, but operators want a heads-up)
  # OR a verifier regression (false-positive slashes in CI of a new
  # release). Either way the operator wants to know.
  #
  # All thresholds are a starting point — tune per-fleet after one
  # week of baseline. The annotations name the underlying labelled
  # series so the runbook query is one click away from the page.
  - name: qsdm-v2-mining-slashing
    rules:
      - alert: QSDMMiningSlashApplied
        # ANY successful slash is page-worthy until you have grown
        # comfortable with the noise floor. Tune for: longer once
        # baseline rate is known. Counter is monotonic — increase()
        # gives the count over the lookback regardless of restarts.
        expr: sum(increase(qsdm_slash_applied_total[15m])) >= 1
        for: 1m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode A in SLASHING_INCIDENT.md — confirm + ratify
          # path. Almost always benign (chain caught a cheater),
          # but the runbook walks the receipt verification so
          # the on-call doesn't reflexively page protocol-eng
          # for a single legitimate slash.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#31-mode-a--qsdmminingslashapplied"
          summary: "{{ $labels.instance }}: slash transaction applied"
          description: |
            At least one qsdm_slash_applied_total has incremented
            in the last 15m. Break out by kind:
              sum by (kind) (increase(qsdm_slash_applied_total[15m]))
            Cross-reference the transaction id via:
              GET /api/v1/mining/slash/{tx_id}
            (the qsdm CLI: `qsdmcli slash-receipt <tx-id>`).
            Confirm the offender's NodeID, EvidenceKind, and that
            auto_revoked behaved as expected. If kind="forged-attestation"
            in volume, suspect a CC-AIK verifier regression in the
            release first (false positives) before assuming widespread
            cheating.

      - alert: QSDMMiningSlashedDustBurst
        # Mass-slash event in CELL terms. 1 CELL = 1_000_000_000 dust.
        # Threshold is 50 CELL drained in 15m — below
        # MIN_ENROLL_STAKE * 5 — i.e. five rigs going down. Tune for
        # your fleet size: a 1000-rig testnet might want 500 CELL,
        # a single-validator devnet wants 10 CELL.
        expr: sum(increase(qsdm_slash_drained_dust_total[15m])) > 5e10
        for: 5m
        labels:
          severity: critical
          subsystem: v2-mining
        annotations:
          # Mode B — the dangerous one. Could be a real cheat
          # ring (ratify) OR a verifier regression (rollback).
          # Runbook §3.2 walks the distinguishing query AND
          # the verifier-rollback procedure. Wrong call here
          # loses real money for honest miners; do not skip it.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#32-mode-b--qsdmminingslasheddustburst"
          summary: "{{ $labels.instance }}: >50 CELL slashed in 15m"
          description: |
            qsdm_slash_drained_dust_total has increased by
            {{ humanize $value }} dust in 15m (>50 CELL). Multiple
            rigs being slashed at once is almost never coincidental —
            suspect either a coordinated cheat ring (great, ratify
            and continue) OR a verifier regression that just shipped
            in the latest release (bad, roll back).

            Triage:
              - Group by EvidenceKind:
                  sum by (kind) (increase(qsdm_slash_drained_dust_total[15m]))
                A single dominant kind = single-source bug.
              - Compare against pre-release baseline:
                  sum(rate(qsdm_slash_drained_dust_total[1d] offset 1d))
              - Spot-check a recent slash receipt:
                  qsdmcli slash-receipt <tx-id>
                If outcome=applied but the operator was clean, halt
                rollout and roll back the verifier release.

      - alert: QSDMMiningSlashRejectionsBurst
        # Rejected slashes outpacing applied slashes signals one of:
        #   - probe / DoS attack against the slashing endpoint
        #   - slasher tooling emitting malformed evidence
        #   - replay flood ("evidence_replayed" reason)
        #   - mass attempts to slash unenrolled NodeIDs
        # Break out by reason in the runbook query — the reason
        # label is the quickest diagnostic.
        expr: sum(increase(qsdm_slash_rejected_total[10m])) >= 10
        for: 5m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode C — usually benign in isolation but a leading
          # indicator of an attacker probing the admission gate
          # before the real slash burst. Runbook §3.3 has the
          # per-reason triage table.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#33-mode-c--qsdmminingslashrejectionsburst"
          summary: "{{ $labels.instance }}: ≥10 slash transactions rejected in 10m"
          description: |
            qsdm_slash_rejected_total grew by {{ $value }} in 10m.
            Break out by reason:
              sum by (reason) (increase(qsdm_slash_rejected_total[10m]))
            Common reasons and what they mean:
              evidence_replayed   — replay protection working;
                                    likely a buggy slasher retrying.
              verifier_failed     — evidence didn't pass the
                                    EvidenceVerifier; either malformed
                                    or a probe.
              node_not_enrolled   — slash submitted against an
                                    unknown NodeID; client bug or
                                    spam.
              insufficient_stake  — slash amount exceeded available
                                    bond; clamp client-side.
            Sustained "verifier_failed" with no applied slashes
            suggests an outsider probing the endpoint — fine, but
            consider rate-limiting upstream of admission.

      - alert: QSDMMiningAutoRevokeBurst
        # Surge of auto-revokes = many miners pushed under
        # MIN_ENROLL_STAKE in a short window. Either coordinated
        # stake-stripping attack OR a software bug that pushed
        # everyone below the line. Either is severe.
        expr: sum(increase(qsdm_slash_auto_revoked_total[15m])) >= 3
        for: 5m
        labels:
          severity: critical
          subsystem: v2-mining
        annotations:
          # Mode D — almost always escalates Mode B but worth
          # paging on its own because it shows the slasher is
          # pushing miners off the active set, not just
          # debiting bonds. Runbook §3.4 covers the slash-
          # arithmetic-bug and stake-stripping-attack
          # branches that AREN'T just B in disguise.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#34-mode-d--qsdmminingautorevokeburst"
          summary: "{{ $labels.instance }}: ≥3 records auto-revoked by SlashApplier in 15m"
          description: |
            SlashApplier.RevokeIfUnderBonded fired for {{ $value }}
            records in 15m. Each fire means the slashed miner's
            remaining bond fell below mining.MinEnrollStakeDust
            (10 CELL). Three+ in 15m is unusual — investigate
            whether the slash amounts were correctly clamped to
            individual rig stake or whether the ApplySlashTx path
            is double-debiting.

  # -----------------------------------------------------------------
  # v2 mining — enrollment registry
  # -----------------------------------------------------------------
  # Consumes qsdm_enrollment_* gauges + counters emitted by
  # pkg/monitoring/enrollment_metrics.go (callback-driven for the
  # gauges, recorder for the counters). The gauges are the chain's
  # economic-safety thermometer: active miners, bonded dust, pending
  # unbond pressure.
  - name: qsdm-v2-mining-enrollment
    rules:
      - alert: QSDMMiningRegistryEmpty
        # Active enrollment count == 0 on a node that has been up
        # long enough to have processed enrollments. Gated on
        # qsdm_uptime_seconds > 600 so testnet bring-ups don't page
        # while the first miner is still flashing their HMAC key.
        # On a v1-only node this gauge is also 0 — but v1-only
        # nodes don't load this rule group; deployments running
        # only v1 should drop the qsdm-v2-mining-* groups.
        expr: |
          qsdm_enrollment_active_count == 0
          and qsdm_process_uptime_seconds > 600
        for: 15m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Deep-link to the Mode A subsection of the
          # enrollment runbook. Mode A is the canonical "zero
          # active records" page; if the registry is wedged
          # rather than empty, the runbook redirects the
          # operator to the chain-liveness runbook in step
          # 3.1.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#31-mode-a--qsdmminingregistryempty"
          summary: "{{ $labels.instance }}: zero active enrollments for 15m"
          description: |
            qsdm_enrollment_active_count is 0 on a node that has
            been up >10m. Either:
              - All miners legitimately unenrolled (check
                qsdm_unenrollment_applied_total rate over the last
                hour).
              - The mempool admission gate is rejecting every
                enrollment (check qsdm_enrollment_rejected_total
                by reason).
              - The block producer stopped sealing — cross-check
                with QSDMMiningChainStuck below.
            Production v2 mainnet should never sit at active=0;
            on testnet this may be acceptable during quiet periods.

      - alert: QSDMMiningRegistryShrinkingFast
        # Active count fell by >25% in 1h on a node that started
        # with at least 4 active records (avoid flap on tiny
        # fleets where one unenroll crosses 25%). Coordinated
        # exit signals operator unrest, a chain incident, or a
        # release regression that broke the miner binaries.
        expr: |
          (
            (qsdm_enrollment_active_count offset 1h) - qsdm_enrollment_active_count
          ) / (qsdm_enrollment_active_count offset 1h) > 0.25
          and (qsdm_enrollment_active_count offset 1h) >= 4
        for: 10m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode B (shrinking-fast) decomposes the drop into
          # voluntary / forced / sweep drivers. The runbook's
          # Mode B redirects to SLASHING_INCIDENT.md if the
          # forced-exit driver dominates — a coordinated
          # cheat-ring incident is a different on-call than a
          # voluntary release-regression exit.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#32-mode-b--qsdmminingregistryshrinkingfast"
          summary: "{{ $labels.instance }}: active enrollments fell {{ $value | humanizePercentage }} in 1h"
          description: |
            qsdm_enrollment_active_count dropped by {{ $value | humanizePercentage }}
            in 1h (relative to the 1h-prior reading). Cross-correlate with:
              - rate(qsdm_unenrollment_applied_total[1h])  — voluntary exits
              - rate(qsdm_slash_applied_total[1h])         — forced exits
              - rate(qsdm_enrollment_unbond_swept_total[1h]) — final-stage sweeps
            If voluntary exits dominate, suspect either a release
            regression (miners hitting a v2-incompatible build) or
            an external incident (e.g. NVIDIA driver rollout). If
            slash-driven, switch to the slashing-group runbook.

      - alert: QSDMMiningPendingUnbondMajority
        # More than half the bonded population is in pending_unbond.
        # That's a coordinated-exit signal — single-rig issues
        # never flip the ratio. The denominator guard keeps the
        # ratio sane on tiny fleets.
        expr: |
          (
            qsdm_enrollment_pending_unbond_count
            /
            (qsdm_enrollment_active_count + qsdm_enrollment_pending_unbond_count)
          ) > 0.5
          and (qsdm_enrollment_active_count + qsdm_enrollment_pending_unbond_count) >= 4
        for: 30m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode C is the leading-indicator runbook entry —
          # >50% of the population in pending_unbond means
          # something upstream is going wrong. The runbook
          # cross-references the slashing-rate and
          # consensus-byzantine signals so operators can
          # identify the upstream cause before the 7-day
          # unbond window matures.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#33-mode-c--qsdmminingpendingunbondmajority"
          summary: "{{ $labels.instance }}: {{ $value | humanizePercentage }} of bonded miners pending unbond"
          description: |
            More than half of the bonded population is in the 7-day
            unbond window. Compare:
              qsdm_enrollment_pending_unbond_count
              qsdm_enrollment_active_count
              qsdm_enrollment_pending_unbond_dust  (CELL locked)
              qsdm_enrollment_bonded_dust          (CELL active)
            Coordinated exit usually precedes a fork-vote, a
            client-software regression, or a known driver rollout
            incompatibility. Investigate before the 7-day sweep
            window closes — once balances credit back, recovery
            requires re-enrollment with fresh bond.

      - alert: QSDMMiningEnrollmentRejectionsBurst
        # Rejected enrollments climbing fast = either a misconfigured
        # client, a probe, or admission-gate regression.
        expr: sum(increase(qsdm_enrollment_rejected_total[10m])) >= 20
        for: 5m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode D maps every closed-enum reject reason to a
          # cause + action row. Operators read the dominant
          # `reason` label off the by-reason breakout query
          # in the description and jump straight to the row
          # in the runbook table.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#34-mode-d--qsdmminingenrollmentrejectionsburst"
          summary: "{{ $labels.instance }}: ≥20 enrollment rejections in 10m"
          description: |
            qsdm_enrollment_rejected_total grew by {{ $value }} in
            10m. Break out by reason:
              sum by (reason) (increase(qsdm_enrollment_rejected_total[10m]))
            Common reasons:
              insufficient_stake — client offered <10 CELL bond.
              gpu_uuid_collision — two NodeIDs claimed the same GPU.
              malformed_payload  — old client / canonicaljson drift.
              duplicate_node_id  — re-enroll without unbond first.
            Sustained "malformed_payload" after a release suggests
            client-server skew — pin client minimum version in the
            quickstart docs.

      - alert: QSDMMiningBondedDustDropped
        # Sudden drop in bonded dust = mass unbond OR mass slash.
        # Threshold of 50 CELL — same calibration as the slash-burst
        # rule so the two pages align in time-series view.
        expr: |
          (qsdm_enrollment_bonded_dust offset 30m) - qsdm_enrollment_bonded_dust > 5e10
          and (qsdm_enrollment_bonded_dust offset 30m) > 0
        for: 10m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode E covers the metric-callback regression
          # branch explicitly: if the drop isn't accounted
          # for by unenroll / slash / sweep rates, the
          # runbook walks the operator through verifying the
          # gauge against the live registry via
          # /api/v1/mining/enrollments. Catches stale
          # EnrollmentStateProvider closures that survive a
          # partial restart.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#35-mode-e--qsdmminingbondeddustdropped"
          summary: "{{ $labels.instance }}: bonded stake dropped >50 CELL in 30m"
          description: |
            Total active bond fell by {{ humanize $value }} dust
            (>50 CELL) in 30m. Decompose:
              - Voluntary: rate(qsdm_unenrollment_applied_total[30m])
              - Forced:    rate(qsdm_slash_drained_dust_total[30m])
              - Sweep:     rate(qsdm_enrollment_unbond_swept_total[30m])
            If neither driver explains the magnitude, suspect a
            metric callback regression (the gauge is read live from
            EnrollmentStateProvider — a stale provider will read
            stale numbers).

  # -----------------------------------------------------------------
  # v2 mining — chain liveness sanity
  # -----------------------------------------------------------------
  # Belt-and-braces companion to the v2-mining groups above.
  # qsdm_chain_height stuck while qsdm_mempool_size grows is the
  # operator-observable shape of "validator wedged" — most v2
  # mining alerts will silently come along for the ride if this
  # one fires, so we keep it terse.
  - name: qsdm-v2-mining-liveness
    rules:
      - alert: QSDMMiningChainStuck
        # Height has not advanced in 5m AND uptime allows. Gauge
        # is monotonic on a healthy node — delta == 0 over 5m on a
        # production block-time of seconds is unambiguous.
        expr: |
          delta(qsdm_chain_height[5m]) == 0
          and qsdm_process_uptime_seconds > 300
        for: 3m
        labels:
          severity: critical
          subsystem: v2-mining
        annotations:
          # Mode A is the only critical-severity v2-mining
          # alert in this file. The runbook spends most of
          # its triage on the "all transactions failed
          # state application" silent-freeze path because
          # that's the operationally most-frequent cause —
          # admission stays open while the producer
          # silently refuses to seal, and every downstream
          # mining alert flatlines as collateral signal
          # rather than firing.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/MINING_LIVENESS.md#31-mode-a--qsdmminingchainstuck"
          summary: "{{ $labels.instance }}: qsdm_chain_height has not advanced in 5m"
          description: |
            Block production has stalled. v2 mining alerts above
            (slash, enrollment) will go quiet because the applier
            is the consumer of these counters. Triage in this
            order:
              1. qsdm_mempool_size — growing? validator stuck on
                 admission. Empty? validator never built a block.
              2. qsdm_validators_active — quorum?
              3. Process logs for "ProduceBlock" errors — the
                 "all transactions failed" path silently freezes
                 the producer when no tx applies.

      - alert: QSDMMiningMempoolBacklog
        # Mempool > 10k pending txs for 10m = admission gate is
        # accepting faster than the producer can drain. On a
        # stack-default config this means the slash/enroll
        # AdmissionCheckers are letting payloads through that
        # the consensus-time applier will reject — costing block
        # space.
        expr: qsdm_mempool_size > 10000
        for: 10m
        labels:
          severity: warning
          subsystem: v2-mining
        annotations:
          # Mode B has a strict promotion path to Mode A:
          # if chain_height stops advancing while the
          # backlog is firing, the runbook redirects the
          # operator to abandon backlog triage and treat
          # the incident as a freeze. The decision tree on
          # the dominant reject-by-reason label
          # (not_enrolled / wrong_contract / decode_failed
          # vs. insufficient_balance / fee_invalid) lives in
          # the runbook table.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/MINING_LIVENESS.md#32-mode-b--qsdmminingmempoolbacklog"
          summary: "{{ $labels.instance }}: mempool >10k pending for 10m"
          description: |
            qsdm_mempool_size is {{ $value }}. Either traffic spiked
            past producer throughput, or the admission gate is
            letting through txs that ApplySlashTx / ApplyEnrollTx
            reject at apply time (admission stateless, applier
            stateful — a known divergence vector).
            Cross-check qsdm_slash_rejected_total and
            qsdm_enrollment_rejected_total; high rejection rate
            means admission is not catching what apply does.

  # -----------------------------------------------------------------
  # v2 attestation — arch-spoof rejection (§4.6.1 / §4.6.2 / §4.6.5)
  # -----------------------------------------------------------------
  # Consumes qsdm_attest_archspoof_rejected_total{reason} emitted
  # by pkg/monitoring/archcheck_metrics.go (recorder pattern,
  # recorded from pkg/mining/verifier.go and the per-type
  # attestation verifiers). Pages on:
  #
  #   reason="unknown_arch":
  #     Attestation.GPUArch outside the closed-enum allowlist.
  #     Single increment is usually a typo'd client; sustained
  #     rate is a probe / future-arch-sneak attempt.
  #
  #   reason="gpu_name_mismatch":
  #     HMAC bundle's gpu_name does not match any pattern for the
  #     claimed arch (the §3.3 step-8 lazy-spoof catch). The bundle
  #     is HMAC-bound under the operator's enrollment key, so this
  #     reason firing means an enrolled operator is spoofing arch
  #     (consumer card claiming Hopper) — economically deterred by
  #     stake bond + slashing, but operators want a heads-up.
  #
  #   reason="cc_subject_mismatch":
  #     CC bundle's leaf cert Subject contains positive product
  #     evidence that contradicts the claimed arch (§4.6.5). To
  #     reach this reason the proof has ALREADY passed cert-chain
  #     pin (§3.2 step 3) + AIK signature (§3.2 step 4), so a
  #     non-zero increment is highly suspicious — fabricated AIK
  #     or serious operator misconfiguration. Pages at higher
  #     severity than the other two reasons.
  - name: qsdm-v2-attest-archspoof
    rules:
      - alert: QSDMAttestArchSpoofUnknownArchBurst
        # Sustained rate of unknown-arch rejections = probe / scan.
        # Threshold 0.1/s = ≥30 rejections in 5m. A typo'd client
        # gets one increment and stops; a probe drives the rate up.
        expr: rate(qsdm_attest_archspoof_rejected_total{reason="unknown_arch"}[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode A is the typo / probe / release-skew
          # signal — the gpu_arch field is outside the
          # closed-enum allowlist. The runbook's §3.1
          # source-distribution table maps {single
          # NodeID, broad NodeIDs, release-correlated}
          # to {operator-side fix, firewall block, alias
          # PR}. Mode A almost never escalates to
          # slashing because the offending field is
          # simply not in the enum — there's no
          # economic gain to harvest.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ARCH_SPOOF_INCIDENT.md#31-mode-a--qsdmattestarchspoofunknownarchburst"
          summary: "{{ $labels.instance }}: sustained unknown-arch rejections"
          description: |
            qsdm_attest_archspoof_rejected_total{reason="unknown_arch"}
            climbing at {{ $value }}/s over 5m. Either:
              - A miner client running an unreleased GPU arch
                (e.g. "rubin", a hypothetical post-Blackwell)
                is auto-retrying. Tighten quickstart docs.
              - External prober scanning the v2 attestation
                surface. Confirm via source IP distribution in
                ingress logs; consider rate-limiting upstream.
              - Client/server skew on alias canonicalisation
                (e.g. miner emits "ada" but server hasn't
                landed alias yet). Cross-check release versions.

      - alert: QSDMAttestArchSpoofGPUNameMismatch
        # Any sustained gpu_name_mismatch is a real spoof attempt
        # by an enrolled operator — page warning. Threshold lower
        # than unknown_arch because the operator-side cost (stake
        # bond at risk) means honest operators rarely trigger this
        # by accident.
        expr: rate(qsdm_attest_archspoof_rejected_total{reason="gpu_name_mismatch"}[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode B is the canonical economic-cheat
          # signal — an enrolled operator's HMAC bundle
          # has gpu_name contradicting the claimed
          # gpu_arch (consumer Ada claiming Hopper, etc).
          # The HMAC binds gpu_name to the bundle, so
          # this isn't a client bug — it's a deliberate
          # or config-drift attempt to claim a higher
          # reward weight. Sustained Mode B from one
          # NodeID IS the canonical forged-attestation
          # slashing case; the runbook's §3.2 hands
          # off to SLASHING_INCIDENT.md for evidence
          # submission. Threshold 0.05/s lower than
          # Mode A because the economic cost (stake
          # bond at risk) means honest operators rarely
          # trigger this by accident.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ARCH_SPOOF_INCIDENT.md#32-mode-b--qsdmattestarchspoofgpunamemismatch"
          summary: "{{ $labels.instance }}: HMAC bundle gpu_name vs gpu_arch mismatch"
          description: |
            qsdm_attest_archspoof_rejected_total{reason="gpu_name_mismatch"}
            climbing at {{ $value }}/s. An enrolled miner is
            submitting proofs whose HMAC-bound gpu_name doesn't
            match the patterns for the claimed gpu_arch. Most
            common shapes:
              - Consumer Ada card (RTX 4090) claiming gpu_arch=hopper
                to chase higher reward weights.
              - Hardware swap on an existing NodeID without
                re-enrollment (bundle still HMAC-signed under
                the old GPU's identity).
            The §3.3 step-8 cross-check rejects these proofs
            before block inclusion; the operator's stake bond
            covers any cumulative damage. To identify the
            offender, cross-reference qsdmcli enrollment-status
            against recent slash candidates. Sustained activity
            from a single NodeID is a slashing case under §8.

      - alert: QSDMAttestArchSpoofCCSubjectMismatch
        # CC-path subject mismatch is critical: to even reach this
        # check the proof has passed cert-chain pin AND AIK
        # signature, so a non-zero increment is ALREADY a
        # cryptographic anomaly. ANY single fire pages immediately.
        expr: increase(qsdm_attest_archspoof_rejected_total{reason="cc_subject_mismatch"}[15m]) > 0
        for: 1m
        labels:
          severity: critical
          subsystem: v2-attest
        annotations:
          # Mode C is the only critical-severity alert
          # in the arch-spoof group, and the only §4.6
          # alert that pages on a SINGLE fire (no rate
          # threshold). To reach this check the proof
          # has already passed cert-chain pin (§3.2
          # step 3) AND AIK signature (§3.2 step 4) —
          # so a non-zero increment is, by construction,
          # either a fabricated AIK leaf (cryptographic
          # anomaly worth a security-team page) OR a
          # real H100-class hardware operating with a
          # stale gpu_arch config (operator
          # misconfiguration, also serious). The
          # runbook's §3.3 decision tree forks on
          # whether the offending Subject CN is
          # consistent with NVIDIA canonical naming —
          # and explicitly tells the operator to NOT
          # unilaterally slash on the cryptographic-
          # anomaly branch (slashing destroys forensic
          # state and the bundle may need to be
          # preserved untouched as evidence).
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ARCH_SPOOF_INCIDENT.md#33-mode-c--qsdmattestarchspoofccsubjectmismatch"
          summary: "{{ $labels.instance }}: CC leaf cert subject contradicts gpu_arch"
          description: |
            qsdm_attest_archspoof_rejected_total{reason="cc_subject_mismatch"}
            incremented in the last 15m. To reach this check the
            CC bundle has ALREADY passed:
              - Cert chain rooted in a genesis-pinned NVIDIA CA
                (§3.2 step 3)
              - AIK ECDSA signature over the canonical preimage
                (§3.2 step 4)
              - PCR firmware/driver floor (§3.2 step 8)
            yet the leaf cert's Subject.CommonName contains
            positive product evidence (e.g. "NVIDIA H100") that
            contradicts the proof's claimed gpu_arch. Two
            possibilities:
              1. Fabricated AIK leaf — an operator with an
                 NVIDIA-issued cert has crafted a leaf with a
                 mismatched arch claim. This is a cryptographic
                 anomaly worth a security-team page.
              2. Operator misconfiguration — the miner binary is
                 reading gpu_arch from a stale config file after
                 a hardware swap. Less severe but still worth
                 a direct contact with the operator.
            Triage: identify the proof via the validator's reject
            log (the rejection wraps archcheck.ErrArchCertSubjectMismatch
            and embeds the offending Subject CN + claimed arch
            in the error message), then check the operator's
            recent enrollment / slash history.

  # -----------------------------------------------------------------
  # v2 attestation — hashrate-band plausibility (§4.6.3)
  # -----------------------------------------------------------------
  # Consumes qsdm_attest_hashrate_rejected_total{arch} emitted by
  # pkg/monitoring/archcheck_metrics.go. Each per-arch series gets
  # its own alert with arch-aware annotations so the on-call
  # knows which product line is being targeted (T4 hashrate
  # spoofs and B200 hashrate spoofs have different remediation:
  # different MIN_FIRMWARE floors, different operator profiles).
  #
  # Threshold 0.05/s ≈ 15 rejections in 5m, lower than the
  # archspoof unknown-arch rule because hashrate fabrication is
  # economic-cheating-flavoured rather than typo-flavoured.
  - name: qsdm-v2-attest-hashrate
    rules:
      - alert: QSDMAttestHashrateOutOfBand
        # Catch-all rule that fires on ANY arch label. The
        # description below uses {{ $labels.arch }} so a single
        # rule covers all five canonical arches without manual
        # duplication. arch="unknown" lands in the default switch
        # branch in pkg/monitoring/archcheck_metrics.go and is
        # rare enough that no separate rule is needed.
        expr: rate(qsdm_attest_hashrate_rejected_total[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          summary: "{{ $labels.instance }}: claimed hashrate out of band for arch={{ $labels.arch }}"
          description: |
            qsdm_attest_hashrate_rejected_total{arch="{{ $labels.arch }}"}
            climbing at {{ $value }}/s over 5m. Miners are
            submitting Attestation.ClaimedHashrateHPS values
            outside the per-arch [Min, Max] band (§4.6.3 in
            MINING_PROTOCOL_V2.md). Bands are deliberately wide
            (~100x range per arch); an out-of-band value is
            either:
              - A units-confusion typo (miner emitting H/min or
                kH/s as raw H/s — quickstart docs may need
                clarification).
              - A leaderboard-stuffing attempt (miner inflating
                claimed hashrate to top the leaderboard without
                actually mining at that rate).
              - A consensus-relevant signal: the rest of the
                attestation is suspect, since the per-type
                verifier ALSO rejected (this counter only fires
                AFTER the hashrate gate trips).
            Reference bands (see §4.6.3 table):
              turing       [10K,    5M]   H/s
              ampere       [50K,   50M]   H/s
              ada-lovelace [100K,  50M]   H/s
              hopper       [1M,   200M]   H/s
              blackwell    [5M,   500M]   H/s

  # -----------------------------------------------------------------
  # v2 governance — authority rotation activity (§4.6 governance)
  # -----------------------------------------------------------------
  # Consumes qsdm_gov_authority_* counters + the
  # qsdm_gov_authority_count gauge emitted by
  # pkg/monitoring/gov_metrics.go. These pages are intentionally
  # low-severity — multisig rotation is a deliberate, rare event
  # that the authority members coordinate out-of-band; the alerts
  # ensure the OTHER members know a vote happened in case the
  # coordinator forgets to ping them.
  - name: qsdm-v2-governance
    rules:
      - alert: QSDMGovAuthorityVoteRecorded
        # Any vote in the last 24h is an "FYI" to the multisig
        # set. Severity info — Alertmanager should route to a
        # passive channel (chat ping) rather than PagerDuty.
        expr: increase(qsdm_gov_authority_voted_total[24h]) > 0
        for: 5m
        labels:
          severity: info
          subsystem: v2-governance
        annotations:
          # Mode A in GOVERNANCE_AUTHORITY_INCIDENT.md —
          # operator coordination glue. The alert exists
          # so every multisig member sees that a vote
          # happened in case the coordinator forgets the
          # secure-channel ping. The runbook's §3.1
          # observation table maps {expected coordinator
          # schedule, unexpected vote, sustained
          # duplicate-vote rejects, vote-validation
          # rejects, mass-rotation event} to one of
          # {acknowledge, secure-channel veto check,
          # script-bug audit, voter-membership audit,
          # planned mass rotation}. The alert is
          # informational — if it pages someone out of
          # bed, the Alertmanager routing config is
          # wrong.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/GOVERNANCE_AUTHORITY_INCIDENT.md#31-mode-a--qsdmgovauthorityvoterecorded"
          summary: "{{ $labels.instance }}: authority rotation vote recorded ({{ $labels.op }})"
          description: |
            qsdm_gov_authority_voted_total{op="{{ $labels.op }}"}
            incremented {{ $value }} time(s) in the last 24h.
            A multisig member submitted a vote to {{ $labels.op }}
            an authority. Pre-activation: the AuthorityVoteStore
            is accumulating ballots toward the M-of-N threshold
            (max(1, N/2 + 1)). Cross-reference qsdmcli watch
            params or the governance read API to see proposal
            details and current vote tally.

      - alert: QSDMGovAuthorityThresholdCrossed
        # Threshold-cross is more interesting than a single vote:
        # the proposal is now staged for activation at its
        # effective_height. Bumps to warning severity so the
        # multisig set gets a louder ping.
        expr: increase(qsdm_gov_authority_crossed_total[24h]) > 0
        for: 1m
        labels:
          severity: warning
          subsystem: v2-governance
        annotations:
          # Mode B in GOVERNANCE_AUTHORITY_INCIDENT.md —
          # the proposal has crossed M-of-N and is
          # staged for activation at effective_height.
          # The window between Crossed and
          # effective_height is the LAST opportunity to
          # coordinate out-of-band; no on-chain
          # cancellation primitive exists. The runbook's
          # §3.2 pre-activation checklist walks
          # {confirm-intent, validate-address (canonical
          # social-engineering attack on op=add),
          # validate-effective-height, op=remove
          # post-count-check}. The veto path is
          # explicitly racing a counter-rotation —
          # there is no "cancel proposal" tx.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/GOVERNANCE_AUTHORITY_INCIDENT.md#32-mode-b--qsdmgovauthoritythresholdcrossed"
          summary: "{{ $labels.instance }}: authority rotation crossed M-of-N threshold ({{ $labels.op }})"
          description: |
            qsdm_gov_authority_crossed_total{op="{{ $labels.op }}"}
            crossed the M-of-N threshold and is now STAGED for
            activation at its effective_height. Confirm:
              - The other multisig members are aware (this alert
                fires INSTEAD of the per-member ping if they
                missed the vote).
              - The effective_height is the agreed value (a
                rotation that activates too soon could leave
                the chain mid-flight on an unwanted authority
                set).
              - qsdm_gov_authority_count gauge will tick on
                activation; cross-check against the genesis
                authority set.

      - alert: QSDMGovAuthorityCountTooLow
        # Hard floor: an authority set of <2 means a single key
        # compromise is a chain-rotation compromise. M-of-N with
        # N=1 reduces to single-signer governance. Page critical.
        # The gauge is seeded at boot from genesis (see
        # SetAuthorityCountGauge in v2wiring), so a value of 0
        # means either the genesis was misconfigured or the
        # adapter wiring broke.
        expr: qsdm_gov_authority_count < 2
        for: 5m
        labels:
          severity: critical
          subsystem: v2-governance
        annotations:
          # Mode C in GOVERNANCE_AUTHORITY_INCIDENT.md —
          # the only critical-severity alert in the
          # governance group, and the only governance
          # alert that fires on a gauge-state rather
          # than a counter-rate. The runbook's §3.3
          # decision tree forks on whether the actual
          # AuthorityList size matches the gauge
          # (real count drop ⇒ Branch A, race a
          # unilateral op=add if N=1; wiring bug ⇒
          # Branch B, restart and audit
          # gov_recorder). With N=0 governance is
          # disabled entirely and only a hard fork can
          # re-seed the AuthorityList — the runbook
          # explicitly calls this out as the
          # worst-case escape hatch. Cross-references
          # SLASHING_INCIDENT.md (slashing of an
          # authority key) and MINING_LIVENESS.md
          # (gov recovery is gated on chain liveness
          # if the authority drop has wedged
          # consensus).
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/GOVERNANCE_AUTHORITY_INCIDENT.md#33-mode-c--qsdmgovauthoritycounttoolow"
          summary: "{{ $labels.instance }}: AuthorityList size = {{ $value }} (< 2)"
          description: |
            qsdm_gov_authority_count is {{ $value }}, below the
            recommended minimum of 2. With <2 authorities the
            M-of-N rule degenerates to single-signer governance
            and any key compromise becomes chain-rotation
            compromise. Either:
              - The genesis was deliberately seeded with a
                single bootstrap authority (testnet bring-up).
                File this alert under "expected during bring-up"
                and silence until rotation lands a second
                member.
              - The adapter wiring in pkg/monitoring/gov_recorder
                broke and the gauge is stuck at 0. Verify with
                the governance read API:
                  GET /api/v1/governance/authority/list
                If the list has >=2 members but the gauge says
                0, file a metric-wiring bug.

  # -----------------------------------------------------------------
  # v2 attestation — recent-rejection ring truncation telemetry
  # -----------------------------------------------------------------
  # Consumes the qsdm_attest_rejection_field_* series emitted by
  # pkg/monitoring/recentrejects_metrics.go (recorder pattern,
  # recorded from pkg/mining/attest/recentrejects.Store.Record).
  # The ring defensively truncates three operator-facing fields
  # before storing them so a malicious miner stuffing the proof
  # envelope cannot OOM the validator:
  #
  #   field="detail"        cap = 200 runes  (verifier RejectError detail)
  #   field="gpu_name"      cap = 256 runes  (HMAC bundle gpu_name)
  #   field="cert_subject"  cap = 256 runes  (CC leaf cert Subject CN)
  #
  # Sustained truncation is normally a sign of one of:
  #   - a hostile miner blowing past the cap to drown signal
  #     (worth a heads-up so operators can correlate with a
  #     slashing-evidence-burst page from the v2-mining group);
  #   - a verifier release that started emitting longer detail
  #     strings and now needs the cap raised — bumping the
  #     constants in pkg/mining/attest/recentrejects/recentrejects.go
  #     (maxDetailRunes / maxGPUNameRunes / maxCertSubjectRunes)
  #     is a 1-line change and a CHANGELOG entry;
  #   - a unicode payload where rune count differs significantly
  #     from byte count — the cap is rune-based by design but
  #     operators sometimes assume bytes; the runes_max gauge is
  #     the diagnostic for this.
  #
  # The truncation rate alert is rate(truncated)/rate(observed)
  # so a low-traffic node firing one rejection at exactly the
  # cap does not page; only a sustained truncation fraction
  # crosses the threshold.
  - name: qsdm-v2-attest-recent-rejections
    rules:
      - alert: QSDMAttestRejectionFieldTruncationSustained
        # Truncation rate over 10m exceeds 25% of observations
        # for a given field. The denominator guard
        # (rate(observed) > 0) avoids 0/0 = NaN on quiet nodes.
        # 25% is permissive — a healthy fleet typically sits at
        # < 1% (mostly the off-by-one cases on multi-byte unicode
        # cert subjects). Tune downwards once you have a week of
        # baseline.
        expr: |
          (
            rate(qsdm_attest_rejection_field_truncated_total[10m])
            /
            rate(qsdm_attest_rejection_field_runes_observed_total[10m])
          ) > 0.25
          and rate(qsdm_attest_rejection_field_runes_observed_total[10m]) > 0
        for: 15m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode D in REJECTION_FLOOD.md — payload-shape
          # alert (NOT volume; Modes A/B/C cover that).
          # The ring's per-field rune-caps are pinned
          # in code (detail=200, gpu_name=256,
          # cert_subject=256) and silently truncate
          # overflows; sustained 25%+ truncation rate
          # means something has changed about the
          # rejection payload distribution. Runbook
          # §7.4 maps the dominant `field` label to
          # cause: detail ⇒ verifier release skew or
          # adversarial stuffing; gpu_name ⇒
          # cross-check ARCH_SPOOF_INCIDENT.md;
          # cert_subject ⇒ benign multi-byte unicode
          # in a real NVIDIA cert.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#74-mode-d--qsdmattestrejectionfieldtruncationsustained"
          summary: "{{ $labels.instance }}: recent-rejection ring is truncating {{ $labels.field }} >25% of the time"
          description: |
            qsdm_attest_rejection_field_truncated_total{field="{{ $labels.field }}"}
            is firing on {{ $value | humanizePercentage }} of observed
            rejections over the last 10 minutes. Possible causes:
              - A miner is stuffing the proof envelope with an
                oversized payload to drown debugging signal —
                cross-check qsdm_attest_archspoof_rejected_total
                and the v2-mining-slashing group; if the offender
                is identifiable, slash via the §8 evidence path.
              - A recent verifier release emits longer
                RejectError.Detail strings than the cap allows —
                check the latest qsdm release notes for any
                §4.6 verifier change, then raise the cap in
                pkg/mining/attest/recentrejects/recentrejects.go
                (maxDetailRunes / maxGPUNameRunes /
                maxCertSubjectRunes) and ship a CHANGELOG entry.
              - A cert_subject containing significant non-ASCII
                content (multi-byte unicode in CN/SAN) — verify
                via qsdm_attest_rejection_field_runes_max and
                the operator's NVIDIA cert chain.
            Triage:
              - Identify the worst offender field:
                  topk(3, rate(qsdm_attest_rejection_field_truncated_total[10m]))
              - Check headroom against the cap:
                  qsdm_attest_rejection_field_runes_max{field="{{ $labels.field }}"}
              - Inspect a recent rejection record for the offending
                payload directly:
                  GET /api/v1/attest/recent-rejections?limit=20
                or:
                  qsdmcli watch archspoof --detailed

      - alert: QSDMAttestRejectionFieldRunesMaxNearCap
        # Process-lifetime max sitting within 10% of the cap
        # for >30m means we are seeing real cap pressure even
        # if the rate has not crossed the truncation-fraction
        # alert above. Acts as a leading indicator before the
        # truncation-rate alert paints. Caps are pinned in code:
        #   detail        200
        #   gpu_name      256
        #   cert_subject  256
        # Hard-coding the cap-1 values in the expression keeps
        # the alert independent of the recordkeeping code.
        expr: |
          (
            (qsdm_attest_rejection_field_runes_max{field="detail"} >= 180)
            or
            (qsdm_attest_rejection_field_runes_max{field="gpu_name"} >= 230)
            or
            (qsdm_attest_rejection_field_runes_max{field="cert_subject"} >= 230)
          )
        for: 30m
        labels:
          severity: info
          subsystem: v2-attest
        annotations:
          # Mode E in REJECTION_FLOOD.md — leading
          # indicator before the truncation-rate alert
          # paints. Severity:info means the alert
          # should NOT page; wire to a passive channel
          # (chat ping, dashboard cell). The operator
          # decision is whether to raise the per-field
          # cap in pkg/mining/attest/recentrejects/
          # before Mode D crosses 25%. Cross-references
          # Mode D's cause table for the same `field`
          # label.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#75-mode-e--qsdmattestrejectionfieldrunesmaxnearcap"
          summary: "{{ $labels.instance }}: recent-rejection ring {{ $labels.field }} runes_max within 10% of cap"
          description: |
            qsdm_attest_rejection_field_runes_max{field="{{ $labels.field }}"}
            has reached {{ $value }} runes — within 10% of the
            in-store cap (200 runes for detail, 256 for gpu_name
            and cert_subject). The ring will continue to truncate
            harmlessly, but if observed proofs are getting close
            to the cap consider whether the cap should be raised
            in pkg/mining/attest/recentrejects/recentrejects.go.
            This alert is informational — it should not page;
            wire it to a passive channel (chat ping) so operators
            see the ramp before the truncation-rate alert above
            crosses 25%.

      # ---------------------------------------------------------------
      # v2 attestation — recent-rejection ring on-disk persistence
      # ---------------------------------------------------------------
      # Independent signal from the truncation alerts above: the
      # persistence layer (pkg/mining/attest/recentrejects/persistence.go)
      # rewrites its JSONL log when the soft-cap is crossed. A
      # sustained high compaction rate means a miner is filling
      # the ring faster than the cap can absorb — useful for
      # detecting rejection-flood patterns where the per-rejection
      # rate stays under the slashing-evidence threshold but the
      # cumulative volume over a long window is anomalous.
      #
      # Tuning:
      #   - softCap defaults to DefaultMaxRejections (1024) so a
      #     healthy validator should compact roughly every
      #     1024 rejections. At 100 rejections/s steady-state
      #     that's ~1 compaction every ~10 seconds — well under
      #     the alert threshold below.
      #   - The threshold is intentionally loose; tighten per-
      #     deployment as you learn your validator's baseline.
      - alert: QSDMAttestRejectionPersistCompactionsHigh
        # >5 compactions/min sustained for 30m equals a soft-cap
        # rewrite every ≤12s for half an hour — at the default
        # softCap=1024 that's ~85 rejections/s sustained, i.e.
        # roughly an order of magnitude above any healthy
        # validator's normal §4.6 rejection rate.
        expr: |
          rate(qsdm_attest_rejection_persist_compactions_total[5m]) * 60 > 5
        for: 30m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode A in REJECTION_FLOOD.md — the soft-cap
          # rewrite loop is keeping up but the rate is
          # anomalously high. Validator is healthy; the
          # VOLUME is the signal. Anchor §7.1 jumps
          # directly to the mode-specific entry point;
          # the runbook also walks the promotion path
          # to Mode B (§7.2) if compactions stay high
          # AND the persister starts dropping records.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#71-mode-a--qsdmattestrejectionpersistcompactionshigh"
          summary: "{{ $labels.instance }}: recent-rejection ring is compacting {{ $value | humanize }}× per minute"
          description: |
            qsdm_attest_rejection_persist_compactions_total has
            been incrementing at >5/min sustained for 30m on
            {{ $labels.instance }}. Each compaction means the
            on-disk JSONL log crossed its soft-cap and was
            rewritten — at the default softCap=1024 this implies
            ~85 rejections/s sustained, ~10× a typical baseline.
            Triage:
              - Confirm the rejection volume is real, not a
                metric leak: rate(qsdm_attestation_rejected_total[5m]).
              - Identify the dominant rejection kind / miner:
                topk(5, rate(qsdm_attestation_rejected_total{kind!=""}[5m]))
              - Inspect recent records for a hostile pattern:
                GET /api/v1/attest/recent-rejections?limit=50
              - If a miner is spamming, consider tightening the
                §4.6 cap (operator policy) or applying a P2P
                rate-limit at the libp2p gate.
            The qsdm_attest_rejection_persist_records_on_disk
            gauge will hover near softCap during the spike;
            after the spike subsides it should drift down on
            the next compaction with no operator action.

      # qsdm_attest_rejection_persist_hardcap_drops_total
      # increments when the FilePersister refuses to admit a
      # record because admitting it would breach the operator-
      # configured hard byte ceiling (cfg.RecentRejectionsMaxBytes)
      # AND a salvage in-band compaction failed to free enough
      # headroom. ANY non-zero rate is anomalous: the soft-cap
      # loop is sized to keep the file an order of magnitude
      # under the hard cap on realistic traffic, so a hit means
      # a flood is actively outrunning the rewrite cycle. The
      # in-memory ring is unaffected (the dashboard tile and
      # /api/v1/attest/recent-rejections still surface every
      # record); only the durable on-disk forensic record was
      # dropped.
      #
      # Independent signal from QSDMAttestRejectionPersistCompactionsHigh:
      #   - Compactions-high fires on sustained rewrite rate.
      #     The validator is keeping up but the volume is
      #     elevated. Operator action: investigate, consider
      #     tightening cap policy.
      #   - HardCapDropping fires on ANY drops. The validator
      #     is NOT keeping up; the cap is now actively shedding
      #     records. Operator action: escalate immediately —
      #     either tune softCap up, MaxBytes up, or apply a
      #     rate-limit at the libp2p gate.
      - alert: QSDMAttestRejectionPersistHardCapDropping
        # rate > 0 for 10m: the drop counter advanced AT ALL
        # over the last 5m, sustained across two scrape windows.
        # No hysteresis — a single drop is operator-relevant.
        expr: |
          rate(qsdm_attest_rejection_persist_hardcap_drops_total[5m]) > 0
        for: 10m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode B in REJECTION_FLOOD.md — strictly
          # worse than Mode A: the persister is now
          # actively SHEDDING records. The in-memory
          # ring is unaffected (dashboard tile and
          # /api/v1/attest/recent-rejections continue
          # to surface every record); ONLY the durable
          # forensic-record persistence is being
          # dropped. Anchor §7.2 walks the
          # cap-tuning vs. mempool-rate-limit decision.
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#72-mode-b--qsdmattestrejectionpersisthardcapdropping"
          summary: "{{ $labels.instance }}: recent-rejection persister is shedding records at the hard byte cap"
          description: |
            qsdm_attest_rejection_persist_hardcap_drops_total has
            been incrementing for ≥10m on {{ $labels.instance }}.
            The on-disk JSONL log has hit its configured byte
            ceiling AND the salvage compaction loop is not
            freeing enough headroom for new records, so the
            FilePersister is now dropping incoming records to
            stay within budget.

            The in-memory ring is unaffected — operators reading
            the dashboard tile or /api/v1/attest/recent-rejections
            continue to see every record. ONLY the durable
            forensic-record persistence is being dropped.

            Triage:
              - Confirm a flood is in progress:
                rate(qsdm_attestation_rejected_total[5m])
              - Check the hard cap configuration vs current
                file size:
                qsdm_attest_rejection_persist_records_on_disk
              - Identify the dominant offender:
                topk(5, rate(qsdm_attestation_rejected_total{kind!=""}[5m]))
              - Mitigations (operator policy):
                * Raise cfg.RecentRejectionsMaxBytes if disk
                  budget allows — gives the soft-cap loop more
                  headroom but trades disk for durability.
                * Raise softCap so each rewrite trims more —
                  amortises the I/O cost of the compaction loop.
                * Apply a libp2p / mempool rate-limit on the
                  offending miner so the rejection volume drops
                  to baseline and the soft-cap loop catches up.

      # qsdm_attest_rejection_per_miner_rate_limited_total
      # increments when the per-miner token-bucket limiter
      # (recentrejects.SetRateLimit, wired via
      # cfg.RecentRejectionsRateLimitPerSec) drops a record at
      # Store.Record() entry. Distinct from the persist-hard-cap
      # alert above:
      #
      #   - HardCapDropping fires when the on-disk persister
      #     refuses an admitted record. The ring saw it; the
      #     disk did not.
      #   - PerMinerRateLimited fires when neither the ring
      #     nor the persister see the record at all. A single
      #     miner has saturated their per-miner rate budget,
      #     full stop.
      #
      # Triage divergence:
      #   - Rate-limit drops with a flat hard-cap rate ⇒ ONE
      #     bad actor. Identify miner_addr from the dashboard
      #     "top offenders" strip and apply policy at the
      #     libp2p / mempool gate.
      #   - Rate-limit drops AND hard-cap drops simultaneously
      #     ⇒ ONE bad actor pushing hard enough that even
      #     after rate-limiting their admitted records overflow
      #     the persister. Tighten the per-miner rate limit
      #     AND raise the disk cap, in that order.
      #   - Rate-limit drops with NO obvious top offender
      #     (broad attack across many miner_addrs) ⇒ either the
      #     limiter rate is too tight (operators tighten under
      #     load and forget to relax later) or a botnet is
      #     active. Cross-check against
      #     qsdm_p2p_peers_connected for unusual peer churn.
      - alert: QSDMAttestRejectionPerMinerRateLimited
        # rate > 0 for 10m: any sustained per-miner drops
        # across two scrape windows. No hysteresis — non-zero
        # is an investigation signal in itself.
        expr: |
          rate(qsdm_attest_rejection_per_miner_rate_limited_total[5m]) > 0
        for: 10m
        labels:
          severity: warning
          subsystem: v2-attest
        annotations:
          # Mode C in REJECTION_FLOOD.md — the EARLIEST
          # defence in the stack. Records are dropped
          # at Store.Record() entry; neither the ring
          # nor the persister sees them. When Mode C
          # fires alone (Modes A and B both flat) it
          # is the cleanest single-bad-actor signal in
          # the stack — the dashboard "top offenders"
          # strip names the saturating miner_addr
          # directly. Anchor §7.3 forks on whether the
          # limiter is doing its job (apply policy
          # upstream) vs. the limiter rate is too tight
          # (relax cfg.RecentRejectionsRateLimitPerSec).
          runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#73-mode-c--qsdmattestrejectionperminerratelimited"
          summary: "{{ $labels.instance }}: per-miner rate-limit is dropping records at recent-rejection ring entry"
          description: |
            qsdm_attest_rejection_per_miner_rate_limited_total has
            been incrementing for ≥10m on {{ $labels.instance }}.
            One or more miners have exhausted their per-miner
            token bucket and Store.Record is dropping their
            records at entry — neither the in-memory ring nor
            the persister see them.

            This is the EARLIEST defence in the rejection-ring
            stack: it fires before hard-cap drops, before
            soft-cap compactions, and before per-field rune
            truncation. A non-zero rate means the operator
            policy (cfg.RecentRejectionsRateLimitPerSec) is
            actively shedding what would otherwise be a flood.

            Triage:
              - Identify the offending miner_addr from the
                dashboard "top offenders" strip:
                /dashboard → Recent Attestation Rejections.
              - Cross-check against the verifier's per-arch
                rejection counters:
                topk(5, rate(qsdm_attestation_rejected_total{kind!=""}[5m])
                  by (miner_addr))
              - If exactly one miner_addr dominates: apply a
                libp2p / mempool ban or rate-limit at the
                gate so the rejection volume drops to baseline.
              - If many miner_addrs share the load: the
                limiter rate may be too tight. Loosen
                cfg.RecentRejectionsRateLimitPerSec or
                widen the burst.
