# Minimal Prometheus 2.x config for QSDM dashboard metrics + example alert rules.
# Keep this file in the same directory as alerts_qsdm.example.yml (rule_files are relative to this file).
#
# Run (adjust paths):
#   prometheus --config.file=prometheus.qsdm.example.yml
#
# Before use: replace DASHBOARD_HOST, DASHBOARD_PORT, and PASTE_METRICS_SCRAPE_SECRET_HERE.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - "alerts_qsdm.example.yml"

scrape_configs:
  - job_name: qsdm-dashboard
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /api/metrics/prometheus
    scheme: http
    static_configs:
      - targets:
          - DASHBOARD_HOST:DASHBOARD_PORT
    authorization:
      type: Bearer
      credentials: PASTE_METRICS_SCRAPE_SECRET_HERE
