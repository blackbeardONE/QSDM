# Minimal Prometheus 2.x config for QSDM dashboard metrics + example alert rules.
# Keep this file in the same directory as alerts_qsdm.example.yml (rule_files are relative to this file).
#
# Run (adjust paths):
#   prometheus --config.file=prometheus.qsdm.example.yml
#
# Before use: replace DASHBOARD_HOST, DASHBOARD_PORT, ALERTMANAGER_HOST, and PASTE_METRICS_SCRAPE_SECRET_HERE.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Alertmanager wiring. Alerts that fire from `rule_files` below
# are forwarded here for routing/templating/notification — the
# config that ships with the repo is at
# ../alertmanager/alertmanager.example.yml.
#
# Replace ALERTMANAGER_HOST:9093 with the actual host:port of
# your Alertmanager. If you don't run Alertmanager, comment out
# this entire block — Prometheus will still evaluate the rules,
# but firing alerts go nowhere.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - ALERTMANAGER_HOST:9093

rule_files:
  - "alerts_qsdm.example.yml"

scrape_configs:
  - job_name: qsdm-dashboard
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /api/metrics/prometheus
    scheme: http
    static_configs:
      - targets:
          - DASHBOARD_HOST:DASHBOARD_PORT
    authorization:
      type: Bearer
      credentials: PASTE_METRICS_SCRAPE_SECRET_HERE
