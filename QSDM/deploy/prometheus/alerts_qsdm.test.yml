# =====================================================================
#  promtool test rules — behavioural test suite for alerts_qsdm.example.yml
# =====================================================================
#
#  Run locally:
#    promtool test rules QSDM/deploy/prometheus/alerts_qsdm.test.yml
#
#  In CI: invoked by the prometheus-rules-check job in
#    .github/workflows/validate-deploy.yml
#  alongside the existing `promtool check rules` syntax check.
#
#  Why this file exists
#  --------------------
#  The companion lint at scripts/check_runbook_coverage.py catches
#  *navigation* breakage (alert ↔ runbook URLs, in-runbook links).
#  This file catches *behavioural* breakage:
#
#    1. Threshold drift: someone tightens `rate > 0.5` to `rate > 0.05`
#       thinking it's "more sensitive". Without these tests, the
#       10x change is silent until the next incident.
#    2. `for:` window drift: shrinking 10m → 1m makes the alert
#       trigger 10x more often. The early `exp_alerts: []` checkpoint
#       in each test catches this — shrinking the for: window would
#       make the alert fire at the early checkpoint and break the
#       test.
#    3. Label/severity drift: the firing checkpoint asserts the
#       full label set the alert produces (severity, subsystem,
#       reason, etc.). Renaming severity from `warning` to `warmig`
#       (typo) trips this test.
#    4. Annotation-template drift: each firing checkpoint also
#       asserts the rendered description / summary / runbook_url.
#       Editing the runbook anchor without updating the annotation
#       template fails the test, which means the runbook lint and
#       this suite together form a closed-loop contract on
#       runbook navigation.
#
#  How each test is structured
#  ---------------------------
#  Every alert in alerts_qsdm.example.yml has at least one test
#  here. Each test follows the same shape:
#
#    * `input_series`: synthetic time series with values chosen
#      to clear the threshold with margin (typically 2× the
#      threshold) over a long-enough span that `rate()` and
#      `increase()` extrapolation produce predictable values.
#
#    * Two `eval_time` checkpoints:
#        - EARLY: `exp_alerts: []`. The condition is true but the
#          `for:` window has not elapsed yet, so no alert fires.
#          Catches `for:` shrinking.
#        - LATE: `exp_alerts: [{exp_labels, exp_annotations}]`.
#          The full firing alert is asserted. Catches threshold,
#          metric-name, label, and annotation drift.
#
#  This file is generated by scripts/gen_promtool_tests.py from
#  the declarative spec at alerts_qsdm.test.spec.yml. The
#  generator validates 1:1 coverage between alertnames in the
#  alerts file and entries in the spec, then runs promtool to
#  capture the rendered Labels and Annotations and embed them
#  here verbatim. Hand edits to THIS file are not preserved
#  across regenerations — edit alerts_qsdm.test.spec.yml and
#  re-run the generator instead.
#
# =====================================================================

rule_files:
  - alerts_qsdm.example.yml

evaluation_interval: 1m

tests:

  # -------------------------------------------------------------------
  # qsdm-nvidia-lock — NVIDIA-lock + NGC submission gate
  # OPERATOR_HYGIENE_INCIDENT.md §3.1 / §3.2
  # NGC_SUBMISSION_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMNvidiaLockHTTPBlocksSpike — rate > 0.5/s, for:10m"
    interval: 1m
    # 60/min = 1.0/s sustained, 2x the 0.5/s threshold.
    input_series:
      - series: 'qsdm_nvidia_lock_http_blocks_total'
        values: '0+60x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMNvidiaLockHTTPBlocksSpike
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMNvidiaLockHTTPBlocksSpike
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-operator-hygiene-incident.json"
            description: "qsdm_nvidia_lock_http_blocks_total is incrementing\nat >0.5/s sustained. State-changing API calls are\nbeing rejected by the HTTP NVIDIA-lock gate. The\n403 response body contains a typed detail message\nnaming the failure mode — capture one and match\nagainst the triage table:\n  \"no NGC proof bundles ingested\" ⇒ sidecar isn't\n      posting OR QSDM_NGC_INGEST_SECRET unset\n  \"no qualifying proof within window\" ⇒ bundle's\n      architecture/gpu_fingerprint policy failed\n  \"matching qsdm_node_id\" ⇒ QSDM_NVIDIA_LOCK_EXPECTED_NODE_ID\n      ≠ QSDM_NGC_PROOF_NODE_ID\n  \"valid qsdm_proof_hmac\" ⇒ HMAC secret rotated\n      on one side only\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/OPERATOR_HYGIENE_INCIDENT.md#31-mode-a--qsdmnvidialockhttpblocksspike"
            summary: ": elevated NVIDIA-lock HTTP 403 rate"

  - name: "QSDMNvidiaLockP2PRejects — increase > 0 in 15m, for:5m"
    interval: 1m
    # Counter ramps 1/min for 30m → increase[15m] = 15.
    input_series:
      - series: 'qsdm_nvidia_lock_p2p_rejects_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMNvidiaLockP2PRejects
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMNvidiaLockP2PRejects
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-operator-hygiene-incident.json"
            description: "qsdm_nvidia_lock_p2p_rejects_total has incremented\nin the last 15m. The P2P NVIDIA-lock gate\n(QSDM_NVIDIA_LOCK_GATE_P2P) dropped libp2p txs\npost-consensus because no qualifying NGC proof\nwas in the ring. P2P drops are silent — the\nproducer has no client-visible signal. Triage:\n  - If Mode A (NVIDIA-lock HTTP) is also firing,\n    shared root: the proof ring is broken. Triage\n    Mode A first; B clears as a follow-on.\n  - If Mode A is flat, the HTTP gate is disabled\n    but P2P is enabled. Confirm the asymmetric\n    toggle is intentional.\n  - If unintended (env-var typo), set\n    QSDM_NVIDIA_LOCK_GATE_P2P=0 and restart.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/OPERATOR_HYGIENE_INCIDENT.md#32-mode-b--qsdmnvidialockp2prejects"
            summary: ": P2P transactions rejected by NVIDIA-lock gate"

  - name: "QSDMNGCChallengeRateLimited — increase > 5 in 10m, for:5m"
    interval: 1m
    # 1/min for 30m → increase[10m] = 10 (above 5).
    input_series:
      - series: 'qsdm_ngc_challenge_rate_limited_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMNGCChallengeRateLimited
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMNGCChallengeRateLimited
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-ngc-submission-incident.json"
            description: "qsdm_ngc_challenge_rate_limited_total has incremented\n>5 times in 10m, sustained 5m. The per-IP cap is 15\nreq/min; sustained hits mean a sidecar is polling\nwithout jitter or ignoring Retry-After. Triage:\n  - Identify the offending IP from access logs\n    (the rate limit is per-IP).\n  - Compare rate(qsdm_ngc_challenge_rate_limited_total)\n    vs. rate(qsdm_ngc_challenge_issued_total) — the\n    healthy ratio is rate_limited << issued.\n  - If the offender is a known sidecar, pin its\n    version against the reference scripts in\n    apps/qsdm-nvidia-ngc/scripts (which jitter\n    ±30s in a 60–120s cycle).\n  - If unknown, add to upstream firewall block list.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/NGC_SUBMISSION_INCIDENT.md#31-mode-a--qsdmngcchallengeratelimited"
            summary: ": sustained 429s on /monitoring/ngc-challenge"

  - name: "QSDMNGCProofIngestRejectBurst — sum(increase) > 10 in 10m, for:5m"
    interval: 1m
    # 2/min on one reason → sum(increase[10m]) = 20.
    input_series:
      - series: 'qsdm_ngc_proof_ingest_rejected_total{reason="hmac"}'
        values: '0+2x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMNGCProofIngestRejectBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMNGCProofIngestRejectBurst
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-ngc-submission-incident.json"
            description: "qsdm_ngc_proof_ingest_rejected_total summed across\nall reject reasons exceeded 10 in 10m, sustained 5m.\nThis is the canonical UPSTREAM CAUSE for trust\ndegradation — sustained Mode B precedes\nQSDMTrustNoAttestationsAccepted /\nQSDMTrustIngestRejectRateElevated /\nQSDMTrustNGCServiceDegraded by 5–20 min.\nTriage: decompose by reason FIRST. The dominant\nreason names the cause:\n  topk(3, sum by (reason)\n    (rate(qsdm_ngc_proof_ingest_rejected_total[10m])))\nReason → cause mapping (see runbook §3.2 table\nfor full triage):\n  hmac           ⇒ secret rotation hit one side only\n  nonce          ⇒ clock skew / retry loop / pool overflow\n  unauthorized   ⇒ third-party probe OR auth misconfig\n  body_too_large ⇒ sidecar release payload regression\n  missing_cuda_hash / invalid_json ⇒ sidecar serializer bug\n  ingest_disabled ⇒ QSDM_NGC_INGEST_SECRET unset (not a\n                    fault if this validator isn't a trust peer)\n  other          ⇒ closed-enum gap; file P3.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/NGC_SUBMISSION_INCIDENT.md#32-mode-b--qsdmngcproofingestrejectburst"
            summary: ": sustained POST /monitoring/ngc-proof rejections"

  # -------------------------------------------------------------------
  # qsdm-submesh
  # SUBMESH_POLICY_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMSubmeshP2PRejects — route OR size increase > 0 in 15m, for:5m"
    interval: 1m
    input_series:
      - series: 'qsdm_submesh_p2p_reject_route_total'
        values: '0+1x30'
      - series: 'qsdm_submesh_p2p_reject_size_total'
        values: '0x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMSubmeshP2PRejects
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMSubmeshP2PRejects
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-submesh-policy-incident.json"
            description: "qsdm_submesh_p2p_reject_route_total or\nqsdm_submesh_p2p_reject_size_total has been\nincrementing for 5m+. P2P txs are dropped\nsilently (libp2p fire-and-forget); producers\nhave no client-visible signal that their\ntxs are being rejected, so the alert IS the\noperator's only handle.\nTriage:\n  - Decompose by reason:\n    rate(qsdm_submesh_p2p_reject_route_total[15m])\n    rate(qsdm_submesh_p2p_reject_size_total[15m])\n  - route_total dominant ⇒ client fee/geotag\n    drift OR validator submesh_config reload\n    tightened routes.\n  - size_total dominant ⇒ client framing\n    drift OR max_tx_size lowered on the\n    matched submesh.\n  - Cross-check qsdm_quarantine_submeshes:\n    sustained policy hits eventually\n    trigger per-submesh isolation\n    (QUARANTINE_INCIDENT.md cascade).\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SUBMESH_POLICY_INCIDENT.md#31-mode-a--qsdmsubmeshp2prejects"
            summary: ": P2P transactions dropped by submesh policy gate"

  - name: "QSDMSubmeshAPISustained422 — summed rejects >= 5 in 10m, for:5m"
    interval: 1m
    # 3 series × 10 each = 30 summed.
    input_series:
      - series: 'qsdm_submesh_api_wallet_reject_route_total'
        values: '0+1x30'
      - series: 'qsdm_submesh_api_wallet_reject_size_total'
        values: '0+1x30'
      - series: 'qsdm_submesh_api_privileged_reject_size_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMSubmeshAPISustained422
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMSubmeshAPISustained422
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-submesh-policy-incident.json"
            description: "≥5 API submesh-policy rejects over 10m,\nsummed across qsdm_submesh_api_wallet_reject_*\nand qsdm_submesh_api_privileged_reject_size_total.\nAPI clients receive HTTP 422 directly so the\nproducer knows; the alert paints because\nthey're retrying without fixing the\nunderlying cause.\nTriage:\n  - Decompose by endpoint:\n    rate(qsdm_submesh_api_wallet_reject_route_total[10m])\n    rate(qsdm_submesh_api_wallet_reject_size_total[10m])\n    rate(qsdm_submesh_api_privileged_reject_size_total[10m])\n  - wallet_route ⇒ stale wallet client OR\n    submesh_config dropped a route the\n    wallet was using.\n  - wallet_size ⇒ wallet release attaching\n    memos / metadata OR max_tx_size lowered.\n  - privileged_size ⇒ mint / token-create\n    caller above the strictest cap (most\n    often a service-account producer\n    payload-size regression).\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SUBMESH_POLICY_INCIDENT.md#32-mode-b--qsdmsubmeshapisustained422"
            summary: ": sustained HTTP 422s from submesh policy gate"

  # -------------------------------------------------------------------
  # qsdm-throughput — chain "silent failure" sentinel
  # OPERATOR_HYGIENE_INCIDENT.md §3.4
  # -------------------------------------------------------------------

  - name: "QSDMNoTransactionsStored — stored=0 but processed>0, for:30m"
    interval: 1m
    # processed climbing, stored flat → divergence sustained.
    input_series:
      - series: 'qsdm_transactions_processed_total'
        values: '0+10x80'
      - series: 'qsdm_transactions_stored_total'
        values: '0x80'
    alert_rule_test:
      - eval_time: 25m
        alertname: QSDMNoTransactionsStored
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 65m
        alertname: QSDMNoTransactionsStored
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-operator-hygiene-incident.json"
            description: "Validator is admitting inbound P2P txs but storing\nzero of them for 30m. Every tx is being dropped\nsomewhere in the six-gate dispatch pipeline (parse\n→ WASM preflight → submesh policy → consensus →\nNVIDIA-lock P2P → storage). Triage by reading which\ncounter is climbing:\n  qsdm_submesh_p2p_reject_*    ⇒ submesh policy\n  qsdm_nvidia_lock_p2p_rejects ⇒ NVIDIA-lock P2P\n  qsdm_transactions_invalid    ⇒ WASM or consensus\n  all flat                     ⇒ storage backend\n                                 erroring (check\n                                 logs for \"Failed\n                                 to store transaction\")\nSee OPERATOR_HYGIENE_INCIDENT.md §3.4 for the full\ndecomposition.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/OPERATOR_HYGIENE_INCIDENT.md#34-mode-d--qsdmnotransactionsstored"
            summary: ": transactions processed but none stored"

  # -------------------------------------------------------------------
  # qsdm-trust-transparency
  # TRUST_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMTrustNoAttestationsAccepted — accepted-rate=0 over 20m, for:5m"
    interval: 1m
    # Counter increments for first 10m (rate > 0), then flat
    # (rate == 0). At t=40m the 20m rate window covers the
    # flat tail entirely, sum(rate)==0 fires.
    input_series:
      - series: 'qsdm_ngc_proof_ingest_accepted_total{reason="ok"}'
        values: '0+1x10 10x60'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMTrustNoAttestationsAccepted
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 40m
        alertname: QSDMTrustNoAttestationsAccepted
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "/api/v1/trust/attestations/summary will report attested=0 until a\nminer or sidecar posts a fresh bundle. Common causes:\n  - The refresh loop (Windows Scheduled Task \"QSDM-NGC-Attest\",\n    apps/qsdm-nvidia-ngc/scripts/attest-from-env-file.ps1)\n    stopped because the host is off / the secret rotated.\n  - Sidecar containers (docker compose --profile gpu) crashed;\n    check qsdm_ngc_proof_ingest_rejected_total by reason.\n  - The node has QSDM_NGC_INGEST_SECRET unset, which\n    disables the ingest route; the counter then stays pinned\n    at zero by design.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#31-mode-a--qsdmtrustnoattestationsaccepted"
            summary: "No accepted NGC proof bundles for 20 minutes"

  - name: "QSDMTrustIngestRejectRateElevated — reject-rate > 1 + accept-rate, for:10m"
    interval: 1m
    # rejected = 120/min = 2.0/s; accepted rate = 0/s. 2 > 1+0.
    input_series:
      - series: 'qsdm_ngc_proof_ingest_rejected_total{reason="hmac"}'
        values: '0+120x30'
      - series: 'qsdm_ngc_proof_ingest_accepted_total{reason="ok"}'
        values: '5x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMTrustIngestRejectRateElevated
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 21m
        alertname: QSDMTrustIngestRejectRateElevated
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "Break out qsdm_ngc_proof_ingest_rejected_total by reason.\n\"hmac_mismatch\" / \"invalid_nonce\" usually means a secret\ndrifted between node and sidecar; \"unauthorized\" is a third\nparty probing the endpoint.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#32-mode-b--qsdmtrustingestrejectrateelevated"
            summary: "NGC ingest rejections outpacing acceptances"

  # -------------------------------------------------------------------
  # qsdm-trust-redundancy
  # TRUST_INCIDENT.md §3.3 / §3.4 / §3.5 / §3.6
  # -------------------------------------------------------------------

  - name: "QSDMTrustAttestationsBelowFloor — warm=1 and attested<2, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_trust_warm'
        values: '1x30'
      - series: 'qsdm_trust_attested'
        values: '1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMTrustAttestationsBelowFloor
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMTrustAttestationsBelowFloor
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "/api/v1/trust/attestations/summary reports attested=1\n(< 2). The external GitHub-Actions probe (.github/workflows/\ntrustcheck-external.yml with --min-attested 2) will also fail\non its next schedule. Common causes:\n  - One of the sidecars (Windows PC / VPS / OCI) is offline\n    or its systemd timer stopped.\n  - QSDM_NGC_PROOF_NODE_ID collision between sidecars\n    (they then collapse to a single attestation in the\n    aggregator — see pkg/api/handlers_trust.go\n    LocalDistinctAttestationSource).\n  - A rotated QSDM_NGC_INGEST_SECRET on one side; cross-\n    reference qsdm_ngc_proof_ingest_rejected_total by reason.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#33-mode-c--qsdmtrustattestationsbelowfloor"
            summary: ": only 1 fresh attestation source(s)"

  - name: "QSDMTrustNGCServiceDegraded — warm=1 and ngc_healthy=0, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_trust_warm'
        values: '1x30'
      - series: 'qsdm_trust_ngc_service_healthy'
        values: '0x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMTrustNGCServiceDegraded
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMTrustNGCServiceDegraded
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "/api/v1/trust/attestations/summary ngc_service_status is\neither \"degraded\" or \"outage\" for 10+ minutes. The trust\npill on qsdm.tech will be amber/red. Check sidecar logs\nand qsdm_ngc_proof_ingest_rejected_total first.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#34-mode-d--qsdmtrustngcservicedegraded"
            summary: ": NGC service status is not 'healthy'"

  - name: "QSDMTrustLastAttestedStale — (time()-last_attested) > 1800, for:5m"
    interval: 1m
    # last_attested pinned at t=60s. diff > 1800 ⇔ N > 31m;
    # for:5m means firing from t=37m. Tested at 40m.
    input_series:
      - series: 'qsdm_trust_warm'
        values: '1x60'
      - series: 'qsdm_trust_last_attested_seconds'
        values: '60x60'
    alert_rule_test:
      - eval_time: 25m
        alertname: QSDMTrustLastAttestedStale
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 40m
        alertname: QSDMTrustLastAttestedStale
        exp_alerts:
        - exp_labels:
            severity: "warning"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "Newest attestation timestamp is 1s\nago (> 30m). fresh_within is 15m by default, so the summary\nwill flip to attested=0 shortly if no new proof arrives.\nCheck sidecar timers and QSDM_NGC_INGEST_SECRET alignment.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#35-mode-e--qsdmtrustlastattestedstale"
            summary: ": newest attestation is >30m old"

  - name: "QSDMTrustAggregatorStale — (time()-last_checked) > 120, for:2m"
    interval: 1m
    # last_checked pinned at t=10s. Condition true from t=3m;
    # for:2m → firing from t=5m.
    input_series:
      - series: 'qsdm_trust_warm'
        values: '1x10'
      - series: 'qsdm_trust_last_checked_seconds'
        values: '10x10'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMTrustAggregatorStale
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 6m
        alertname: QSDMTrustAggregatorStale
        exp_alerts:
        - exp_labels:
            severity: "critical"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-trust-incident.json"
            description: "qsdm_trust_last_checked_seconds has not advanced in >2m\nbut refresh_interval is 10s\nby default. The aggregator ticker is wedged (probably a\nblocked peer provider call or storage read). /api/v1/trust/\nattestations/summary will go stale from a user perspective\nregardless of how many proofs are arriving. Restart the\nqsdm service and capture a goroutine dump.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/TRUST_INCIDENT.md#36-mode-f--qsdmtrustaggregatorstale"
            summary: ": TrustAggregator Refresh() is stuck"

  # -------------------------------------------------------------------
  # qsdm-quarantine
  # QUARANTINE_INCIDENT.md §3.1 / §3.2
