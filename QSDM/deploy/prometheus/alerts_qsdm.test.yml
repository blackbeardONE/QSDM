  # -------------------------------------------------------------------
  # qsdm-v2-attest-recent-rejections — §4.6 rejection-ring health
  # REJECTION_FLOOD.md §7.1 / §7.2 / §7.3 / §7.4 / §7.5
  # -------------------------------------------------------------------

  - name: "QSDMAttestRejectionFieldTruncationSustained — truncated/observed > 0.25, for:15m"
    interval: 1m
    # truncated 30/min, observed 60/min → ratio = 0.5.
    input_series:
      - series: 'qsdm_attest_rejection_field_truncated_total'
        values: '0+30x40'
      - series: 'qsdm_attest_rejection_field_runes_observed_total'
        values: '0+60x40'
    alert_rule_test:
      - eval_time: 10m
        alertname: QSDMAttestRejectionFieldTruncationSustained
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 26m
        alertname: QSDMAttestRejectionFieldTruncationSustained
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_field_truncated_total{field=\"\"}\nis firing on 50% of observed\nrejections over the last 10 minutes. Possible causes:\n  - A miner is stuffing the proof envelope with an\n    oversized payload to drown debugging signal —\n    cross-check qsdm_attest_archspoof_rejected_total\n    and the v2-mining-slashing group; if the offender\n    is identifiable, slash via the §8 evidence path.\n  - A recent verifier release emits longer\n    RejectError.Detail strings than the cap allows —\n    check the latest qsdm release notes for any\n    §4.6 verifier change, then raise the cap in\n    pkg/mining/attest/recentrejects/recentrejects.go\n    (maxDetailRunes / maxGPUNameRunes /\n    maxCertSubjectRunes) and ship a CHANGELOG entry.\n  - A cert_subject containing significant non-ASCII\n    content (multi-byte unicode in CN/SAN) — verify\n    via qsdm_attest_rejection_field_runes_max and\n    the operator's NVIDIA cert chain.\nTriage:\n  - Identify the worst offender field:\n      topk(3, rate(qsdm_attest_rejection_field_truncated_total[10m]))\n  - Check headroom against the cap:\n      qsdm_attest_rejection_field_runes_max{field=\"\"}\n  - Inspect a recent rejection record for the offending\n    payload directly:\n      GET /api/v1/attest/recent-rejections?limit=20\n    or:\n      qsdmcli watch archspoof --detailed\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#74-mode-d--qsdmattestrejectionfieldtruncationsustained"
            summary: ": recent-rejection ring is truncating  >25% of the time"

  - name: "QSDMAttestRejectionFieldRunesMaxNearCap — detail rune-cap >= 180, for:30m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_field_runes_max{field="detail"}'
        values: '200x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMAttestRejectionFieldRunesMaxNearCap
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDMAttestRejectionFieldRunesMaxNearCap
        exp_alerts:
        - exp_labels:
            field: "detail"
            severity: "info"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_field_runes_max{field=\"detail\"}\nhas reached 200 runes — within 10% of the\nin-store cap (200 runes for detail, 256 for gpu_name\nand cert_subject). The ring will continue to truncate\nharmlessly, but if observed proofs are getting close\nto the cap consider whether the cap should be raised\nin pkg/mining/attest/recentrejects/recentrejects.go.\nThis alert is informational — it should not page;\nwire it to a passive channel (chat ping) so operators\nsee the ramp before the truncation-rate alert above\ncrosses 25%.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#75-mode-e--qsdmattestrejectionfieldrunesmaxnearcap"
            summary: ": recent-rejection ring detail runes_max within 10% of cap"

  - name: "QSDMAttestRejectionPersistCompactionsHigh — rate*60 > 5, for:30m"
    interval: 1m
    # 6/min sustained → rate ≈ 0.1/s → rate*60 = 6 > 5.
    input_series:
      - series: 'qsdm_attest_rejection_persist_compactions_total'
        values: '0+6x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMAttestRejectionPersistCompactionsHigh
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 36m
        alertname: QSDMAttestRejectionPersistCompactionsHigh
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_persist_compactions_total has\nbeen incrementing at >5/min sustained for 30m on\n. Each compaction means the\non-disk JSONL log crossed its soft-cap and was\nrewritten — at the default softCap=1024 this implies\n~85 rejections/s sustained, ~10× a typical baseline.\nTriage:\n  - Confirm the rejection volume is real, not a\n    metric leak: rate(qsdm_attestation_rejected_total[5m]).\n  - Identify the dominant rejection kind / miner:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Inspect recent records for a hostile pattern:\n    GET /api/v1/attest/recent-rejections?limit=50\n  - If a miner is spamming, consider tightening the\n    §4.6 cap (operator policy) or applying a P2P\n    rate-limit at the libp2p gate.\nThe qsdm_attest_rejection_persist_records_on_disk\ngauge will hover near softCap during the spike;\nafter the spike subsides it should drift down on\nthe next compaction with no operator action.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#71-mode-a--qsdmattestrejectionpersistcompactionshigh"
            summary: ": recent-rejection ring is compacting 6× per minute"

  - name: "QSDMAttestRejectionPersistHardCapDropping — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_persist_hardcap_drops_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMAttestRejectionPersistHardCapDropping
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMAttestRejectionPersistHardCapDropping
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_persist_hardcap_drops_total has\nbeen incrementing for ≥10m on .\nThe on-disk JSONL log has hit its configured byte\nceiling AND the salvage compaction loop is not\nfreeing enough headroom for new records, so the\nFilePersister is now dropping incoming records to\nstay within budget.\n\nThe in-memory ring is unaffected — operators reading\nthe dashboard tile or /api/v1/attest/recent-rejections\ncontinue to see every record. ONLY the durable\nforensic-record persistence is being dropped.\n\nTriage:\n  - Confirm a flood is in progress:\n    rate(qsdm_attestation_rejected_total[5m])\n  - Check the hard cap configuration vs current\n    file size:\n    qsdm_attest_rejection_persist_records_on_disk\n  - Identify the dominant offender:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Mitigations (operator policy):\n    * Raise cfg.RecentRejectionsMaxBytes if disk\n      budget allows — gives the soft-cap loop more\n      headroom but trades disk for durability.\n    * Raise softCap so each rewrite trims more —\n      amortises the I/O cost of the compaction loop.\n    * Apply a libp2p / mempool rate-limit on the\n      offending miner so the rejection volume drops\n      to baseline and the soft-cap loop catches up.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#72-mode-b--qsdmattestrejectionpersisthardcapdropping"
            summary: ": recent-rejection persister is shedding records at the hard byte cap"

  - name: "QSDMAttestRejectionPerMinerRateLimited — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_per_miner_rate_limited_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMAttestRejectionPerMinerRateLimited
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMAttestRejectionPerMinerRateLimited
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_per_miner_rate_limited_total has\nbeen incrementing for ≥10m on .\nOne or more miners have exhausted their per-miner\ntoken bucket and Store.Record is dropping their\nrecords at entry — neither the in-memory ring nor\nthe persister see them.\n\nThis is the EARLIEST defence in the rejection-ring\nstack: it fires before hard-cap drops, before\nsoft-cap compactions, and before per-field rune\ntruncation. A non-zero rate means the operator\npolicy (cfg.RecentRejectionsRateLimitPerSec) is\nactively shedding what would otherwise be a flood.\n\nTriage:\n  - Identify the offending miner_addr from the\n    dashboard \"top offenders\" strip:\n    /dashboard → Recent Attestation Rejections.\n  - Cross-check against the verifier's per-arch\n    rejection counters:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m])\n      by (miner_addr))\n  - If exactly one miner_addr dominates: apply a\n    libp2p / mempool ban or rate-limit at the\n    gate so the rejection volume drops to baseline.\n  - If many miner_addrs share the load: the\n    limiter rate may be too tight. Loosen\n    cfg.RecentRejectionsRateLimitPerSec or\n    widen the burst.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#73-mode-c--qsdmattestrejectionperminerratelimited"
            summary: ": per-miner rate-limit is dropping records at recent-rejection ring entry"
