  # -------------------------------------------------------------------
  # qsdm-v2-attest-recent-rejections — §4.6 rejection-ring health
  # REJECTION_FLOOD.md §7.1 / §7.2 / §7.3 / §7.4 / §7.5
  # -------------------------------------------------------------------

  - name: "QSDMAttestRejectionFieldTruncationSustained — truncated/observed > 0.25, for:15m"
    interval: 1m
    # truncated 30/min, observed 60/min → ratio = 0.5.
    input_series:
      - series: 'qsdm_attest_rejection_field_truncated_total'
        values: '0+30x40'
      - series: 'qsdm_attest_rejection_field_runes_observed_total'
        values: '0+60x40'
    alert_rule_test:
      - eval_time: 10m
        alertname: QSDMAttestRejectionFieldTruncationSustained
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 26m
        alertname: QSDMAttestRejectionFieldTruncationSustained
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_field_truncated_total{field=\"\"}\nis firing on 50% of observed\nrejections over the last 10 minutes. Possible causes:\n  - A miner is stuffing the proof envelope with an\n    oversized payload to drown debugging signal —\n    cross-check qsdm_attest_archspoof_rejected_total\n    and the v2-mining-slashing group; if the offender\n    is identifiable, slash via the §8 evidence path.\n  - A recent verifier release emits longer\n    RejectError.Detail strings than the cap allows —\n    check the latest qsdm release notes for any\n    §4.6 verifier change, then raise the cap in\n    pkg/mining/attest/recentrejects/recentrejects.go\n    (maxDetailRunes / maxGPUNameRunes /\n    maxCertSubjectRunes) and ship a CHANGELOG entry.\n  - A cert_subject containing significant non-ASCII\n    content (multi-byte unicode in CN/SAN) — verify\n    via qsdm_attest_rejection_field_runes_max and\n    the operator's NVIDIA cert chain.\nTriage:\n  - Identify the worst offender field:\n      topk(3, rate(qsdm_attest_rejection_field_truncated_total[10m]))\n  - Check headroom against the cap:\n      qsdm_attest_rejection_field_runes_max{field=\"\"}\n  - Inspect a recent rejection record for the offending\n    payload directly:\n      GET /api/v1/attest/recent-rejections?limit=20\n    or:\n      qsdmcli watch archspoof --detailed\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#74-mode-d--qsdmattestrejectionfieldtruncationsustained"
            summary: ": recent-rejection ring is truncating  >25% of the time"

  - name: "QSDMAttestRejectionFieldRunesMaxNearCap — detail rune-cap >= 180, for:30m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_field_runes_max{field="detail"}'
        values: '200x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMAttestRejectionFieldRunesMaxNearCap
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDMAttestRejectionFieldRunesMaxNearCap
        exp_alerts:
        - exp_labels:
            field: "detail"
            severity: "info"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_field_runes_max{field=\"detail\"}\nhas reached 200 runes — within 10% of the\nin-store cap (200 runes for detail, 256 for gpu_name\nand cert_subject). The ring will continue to truncate\nharmlessly, but if observed proofs are getting close\nto the cap consider whether the cap should be raised\nin pkg/mining/attest/recentrejects/recentrejects.go.\nThis alert is informational — it should not page;\nwire it to a passive channel (chat ping) so operators\nsee the ramp before the truncation-rate alert above\ncrosses 25%.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#75-mode-e--qsdmattestrejectionfieldrunesmaxnearcap"
            summary: ": recent-rejection ring detail runes_max within 10% of cap"

  - name: "QSDMAttestRejectionPersistCompactionsHigh — rate*60 > 5, for:30m"
    interval: 1m
    # 6/min sustained → rate ≈ 0.1/s → rate*60 = 6 > 5.
    input_series:
      - series: 'qsdm_attest_rejection_persist_compactions_total'
        values: '0+6x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMAttestRejectionPersistCompactionsHigh
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 36m
        alertname: QSDMAttestRejectionPersistCompactionsHigh
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_persist_compactions_total has\nbeen incrementing at >5/min sustained for 30m on\n. Each compaction means the\non-disk JSONL log crossed its soft-cap and was\nrewritten — at the default softCap=1024 this implies\n~85 rejections/s sustained, ~10× a typical baseline.\nTriage:\n  - Confirm the rejection volume is real, not a\n    metric leak: rate(qsdm_attestation_rejected_total[5m]).\n  - Identify the dominant rejection kind / miner:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Inspect recent records for a hostile pattern:\n    GET /api/v1/attest/recent-rejections?limit=50\n  - If a miner is spamming, consider tightening the\n    §4.6 cap (operator policy) or applying a P2P\n    rate-limit at the libp2p gate.\nThe qsdm_attest_rejection_persist_records_on_disk\ngauge will hover near softCap during the spike;\nafter the spike subsides it should drift down on\nthe next compaction with no operator action.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#71-mode-a--qsdmattestrejectionpersistcompactionshigh"
            summary: ": recent-rejection ring is compacting 6× per minute"

  - name: "QSDMAttestRejectionPersistHardCapDropping — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_persist_hardcap_drops_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMAttestRejectionPersistHardCapDropping
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMAttestRejectionPersistHardCapDropping
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_persist_hardcap_drops_total has\nbeen incrementing for ≥10m on .\nThe on-disk JSONL log has hit its configured byte\nceiling AND the salvage compaction loop is not\nfreeing enough headroom for new records, so the\nFilePersister is now dropping incoming records to\nstay within budget.\n\nThe in-memory ring is unaffected — operators reading\nthe dashboard tile or /api/v1/attest/recent-rejections\ncontinue to see every record. ONLY the durable\nforensic-record persistence is being dropped.\n\nTriage:\n  - Confirm a flood is in progress:\n    rate(qsdm_attestation_rejected_total[5m])\n  - Check the hard cap configuration vs current\n    file size:\n    qsdm_attest_rejection_persist_records_on_disk\n  - Identify the dominant offender:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Mitigations (operator policy):\n    * Raise cfg.RecentRejectionsMaxBytes if disk\n      budget allows — gives the soft-cap loop more\n      headroom but trades disk for durability.\n    * Raise softCap so each rewrite trims more —\n      amortises the I/O cost of the compaction loop.\n    * Apply a libp2p / mempool rate-limit on the\n      offending miner so the rejection volume drops\n      to baseline and the soft-cap loop catches up.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#72-mode-b--qsdmattestrejectionpersisthardcapdropping"
            summary: ": recent-rejection persister is shedding records at the hard byte cap"

  - name: "QSDMAttestRejectionPerMinerRateLimited — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_attest_rejection_per_miner_rate_limited_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMAttestRejectionPerMinerRateLimited
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMAttestRejectionPerMinerRateLimited
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-rejection-flood.json"
            description: "qsdm_attest_rejection_per_miner_rate_limited_total has\nbeen incrementing for ≥10m on .\nOne or more miners have exhausted their per-miner\ntoken bucket and Store.Record is dropping their\nrecords at entry — neither the in-memory ring nor\nthe persister see them.\n\nThis is the EARLIEST defence in the rejection-ring\nstack: it fires before hard-cap drops, before\nsoft-cap compactions, and before per-field rune\ntruncation. A non-zero rate means the operator\npolicy (cfg.RecentRejectionsRateLimitPerSec) is\nactively shedding what would otherwise be a flood.\n\nTriage:\n  - Identify the offending miner_addr from the\n    dashboard \"top offenders\" strip:\n    /dashboard → Recent Attestation Rejections.\n  - Cross-check against the verifier's per-arch\n    rejection counters:\n    topk(5, rate(qsdm_attestation_rejected_total{kind!=\"\"}[5m])\n      by (miner_addr))\n  - If exactly one miner_addr dominates: apply a\n    libp2p / mempool ban or rate-limit at the\n    gate so the rejection volume drops to baseline.\n  - If many miner_addrs share the load: the\n    limiter rate may be too tight. Loosen\n    cfg.RecentRejectionsRateLimitPerSec or\n    widen the burst.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REJECTION_FLOOD.md#73-mode-c--qsdmattestrejectionperminerratelimited"
            summary: ": per-miner rate-limit is dropping records at recent-rejection ring entry"

  # -------------------------------------------------------------------
  # qsdm-stub-active — silent stub-deployment guard
  # STUB_DEPLOYMENT_INCIDENT.md (kind-anchored sections)
  # -------------------------------------------------------------------

  - name: "QSDMStubActive — qsdm_stub_active{kind} == 1, for:5m"
    interval: 1m
    # Gauge held at 1 for the full window; alert fires after the
    # 5m for-clause. The early checkpoint at 4m must be silent
    # (still inside for-clause), the late checkpoint at 6m must
    # be firing.
    input_series:
      - series: 'qsdm_stub_active{kind="poe"}'
        values: '1x10'
    alert_rule_test:
      - eval_time: 4m
        alertname: QSDMStubActive
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 6m
        alertname: QSDMStubActive
        exp_alerts:
        - exp_labels:
            kind: "poe"
            severity: "critical"
            subsystem: "v2-deployment"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-stub-deployment-incident.json"
            description: "qsdm_stub_active{kind=\"poe\"} == 1 on\n for ≥5m.\n\nA stub-shipped code path is active in this binary. Some\nstubs are operationally dangerous in production:\n\n  - kind=\"poe\": non-CGO consensus ACCEPTS transactions\n    WITHOUT signature verification. Hard-fail security\n    event in production. Rebuild with CGO_ENABLED=1 and\n    liboqs available.\n\n  - kind=\"dilithium\" / \"wallet\": quantum-safe ML-DSA-87\n    not available; SHA-256 fallback in use. Downgrade\n    from the v2 mining protocol's quantum-safe promise.\n    Rebuild with CGO + liboqs.\n\n  - kind=\"cc\": nvidia-cc-v1 stub verifier rejects every\n    proof. Validators using this stub admit zero v2\n    mining proofs of Type=nvidia-cc-v1 (Phase 2c-iv work\n    pending). Replace cc.NewStubVerifier() with the real\n    AIK verifier in the validator wiring.\n\n  - kind=\"slashing\": at least one EvidenceKind is wired\n    to the StubVerifier (always rejects). Slash txs of\n    that kind silently fail. Replace the StubVerifier\n    registration in slashing.NewProductionDispatcher\n    with the real per-kind verifier.\n\n  - kind=\"mesh3d_cuda\": CUDA acceleration unavailable;\n    CPU fallback in use. Functionally correct but\n    throughput will be far below CUDA-enabled capacity.\n\n  - kind=\"wasm_sdk\": WASM module execution unavailable\n    (non-CGO). Modules configured under [wasm.*] will\n    all fail to load.\n\nTriage:\n  - See QSDM/docs/docs/runbooks/STUB_DEPLOYMENT_INCIDENT.md\n    for the kind-specific remediation (the runbook_url\n    above anchors directly into the right section).\n  - This alert is for:5m which means a brand-new node\n    boot will not page; the gauge has to remain 1 for\n    two scrape windows.\n  - To see all currently-active kinds:\n      qsdm_stub_active == 1\n    and group by `kind` for an at-a-glance summary.\n  - This alert NEVER auto-resolves until the binary is\n    redeployed with the stub replaced. There is no\n    \"transient\" stub-active condition.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/STUB_DEPLOYMENT_INCIDENT.md#kind-poe"
            summary: ": stub implementation active for kind=poe"

  # -------------------------------------------------------------------
  # qsdm-wallet — wallet HTTP API health
  # WALLET_INCIDENT.md §3.1 / §3.2 / §3.3
  # -------------------------------------------------------------------

  - name: "QSDMWalletSendErrorRate — handler-failure ratio > 0.1, for:10m"
    interval: 1m
    # Total send rate = 60/min (success 40/min + store_failed
    # 20/min). store_failed/total = 20/60 ≈ 0.33, well above
    # the 0.1 threshold. instance label propagates from input.
    input_series:
      - series: 'qsdm_wallet_send_total{result="success",instance="i1"}'
        values: '0+40x40'
      - series: 'qsdm_wallet_send_total{result="store_failed",instance="i1"}'
        values: '0+20x40'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMWalletSendErrorRate
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMWalletSendErrorRate
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-wallet-incident.json"
            description: "qsdm_wallet_send_total handler-side failure ratio\n(tx_create_failed + store_failed + no_wallet_service +\nnvidia_lock_blocked) / total > 10% on\ni1 for ≥10m.\n\nSubmesh-policy and dedupe rejects are NOT counted in\nthis ratio — they live in\nqsdm_submesh_api_wallet_reject_*_total and\nqsdm_p2p_wallet_ingress_dedupe_skip_total respectively\n(covered by QSDMSubmeshAPISustained422 and the\nquarantine pipeline).\n\nTriage:\n  - Drill into the failure tag breakdown:\n      topk(3,\n        sum by (result) (rate(qsdm_wallet_send_total{result!=\"success\"}[5m])))\n    The dominant tag tells you the failure mode.\n  - tx_create_failed → wallet service init issue\n    (CGO/liboqs); cross-check qsdm_stub_active{kind=\"wallet\"}.\n  - store_failed → storage wedge; cross-check\n    QSDMNoTransactionsStored and the storage-backend\n    runbook (OPERATOR_HYGIENE_INCIDENT.md §3.4).\n  - no_wallet_service → wallet didn't initialize at\n    node boot; check startup logs for liboqs/OpenSSL\n    errors.\n  - nvidia_lock_blocked → NVIDIA-lock proof ring is\n    empty or the gate is misconfigured; cross-check\n    NGC_SUBMISSION_INCIDENT.md and OPERATOR_HYGIENE\n    §3.1 / §3.2.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/WALLET_INCIDENT.md#31-mode-a--qsdmwalletsenderrorrate"
            summary: "i1: /api/v1/wallet/send error rate above 10% for ≥10m"

  - name: "QSDMWalletStorageErrorBurst — rate*60 > 1, for:5m"
    interval: 1m
    # Combined wallet storage-error rate at 2/min (1 from
    # balance, 1 from send) → rate*60 = 2 > 1. Crosses for:5m.
    input_series:
      - series: 'qsdm_wallet_balance_query_total{result="storage_error",instance="i1"}'
        values: '0+1x40'
      - series: 'qsdm_wallet_send_total{result="store_failed",instance="i1"}'
        values: '0+1x40'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMWalletStorageErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 8m
        alertname: QSDMWalletStorageErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-wallet-incident.json"
            description: "Combined rate of qsdm_wallet_balance_query_total{result=\"storage_error\"}\n+ qsdm_wallet_send_total{result=\"store_failed\"} on\ni1 exceeds 1/min for ≥5m.\n\nThis indicates the storage backend (BoltDB/Badger) is\nfailing reads OR writes from the wallet API surface.\nTriage:\n  - Cross-check QSDMNoTransactionsStored\n    (OPERATOR_HYGIENE_INCIDENT.md §3.4) — if firing\n    concurrently, the storage wedge is system-wide\n    and not wallet-specific.\n  - Cross-check QSDMMiningChainStuck\n    (MINING_LIVENESS.md §3.1) — block production\n    will follow if storage stays wedged.\n  - Inspect node logs for \"Failed to get balance\" /\n    \"Failed to store transaction\" and the underlying\n    storage error.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/WALLET_INCIDENT.md#32-mode-b--qsdmwalletstorageerrorburst"
            summary: "i1: wallet API storage errors > 1/min for ≥5m"

  - name: "QSDMWalletMintBurst — rate*60 > 5, for:30m"
    interval: 1m
    # 10 mints/min sustained for the full 40m → rate*60 = 10
    # > 5 threshold. Crosses for:30m at 35m.
    input_series:
      - series: 'qsdm_wallet_mint_total{result="success",instance="i1"}'
        values: '0+10x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMWalletMintBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 36m
        alertname: QSDMWalletMintBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            result: "success"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-wallet-incident.json"
            description: "qsdm_wallet_mint_total{result=\"success\"} on\ni1 has been incrementing at\n>5/min sustained for ≥30m (≥150 mints in the window).\n\n$CELL mint is admin-only and gated by NVIDIA-lock.\nSustained successful mint volume regardless of policy\nis a supply-inflation signal:\n  - Legitimate cause: an admin running a test campaign\n    without notifying ops. Confirm out-of-band with\n    the operator who owns the API credentials.\n  - Adversarial cause: compromised admin credentials.\n    Rotate the credential and audit the recipient\n    addresses against the legitimate-recipient list.\n\nTriage:\n  - List the mint amounts and recipients from logs:\n    grep '\"coin\":\"CELL\"' on the validator's stdout.\n  - Cross-check QSDMGovAuthorityVoteRecorded — if a\n    governance vote authorized the campaign, the vote\n    will be in the chain.\n  - If recipient is not on the legitimate list, treat\n    as a credential compromise: rotate, restrict, and\n    file an incident report.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/WALLET_INCIDENT.md#33-mode-c--qsdmwalletmintburst"
            summary: "i1: $CELL mint rate > 5/min for ≥30m"

  # -------------------------------------------------------------------
  # qsdm-storage — storage backend health
  # STORAGE_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMStorageWriteErrorBurst — store_transaction err rate*60 > 1, for:5m"
    interval: 1m
    # 2 errors/min sustained → rate*60 = 2 > 1 threshold.
    # Crosses for:5m at 6m.
    input_series:
      - series: 'qsdm_storage_op_total{op="store_transaction",result="error",instance="i1"}'
        values: '0+2x40'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMStorageWriteErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 8m
        alertname: QSDMStorageWriteErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "store_transaction"
            result: "error"
            severity: "warning"
            subsystem: "v2-storage"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-storage-incident.json"
            description: "qsdm_storage_op_total{op=\"store_transaction\",result=\"error\"}\nrate on i1 has been > 1/min sustained\nfor ≥5m. The storage backend (SQLite / FileStorage / Scylla)\nis rejecting transaction writes.\n\nTriage:\n  - Drill into the success-vs-error ratio to confirm the\n    magnitude:\n      rate(qsdm_storage_op_total{op=\"store_transaction\",result=\"error\"}[5m])\n      /\n      rate(qsdm_storage_op_total{op=\"store_transaction\"}[5m])\n  - Cross-check QSDMNoTransactionsStored: if firing\n    concurrently, ZERO transactions are completing\n    (full storage wedge); if NOT firing, some writes\n    are getting through but a fraction are failing\n    (lock contention, partial disk failure, transient\n    Scylla quorum loss).\n  - Cross-check QSDMWalletStorageErrorBurst: if firing\n    concurrently, the wallet API surface is seeing the\n    failures end-to-end (this is expected). If NOT\n    firing but QSDMStorageWriteErrorBurst is, the\n    error volume is from p2p ingress (libp2p\n    accepting txs that storage then rejects) rather\n    than the wallet API.\n  - Inspect node logs for storage error messages\n    (SQLite \"database is locked\", Scylla \"quorum\",\n    FileStorage \"no space left\").\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/STORAGE_INCIDENT.md#31-mode-a--qsdmstoragewriteerrorburst"
            summary: "i1: storage StoreTransaction errors > 1/min for ≥5m"

  - name: "QSDMStorageReadyFailing — ready err rate > 0, for:2m"
    interval: 1m
    # 1 ready error/min → rate > 0. Crosses for:2m at 3m.
    input_series:
      - series: 'qsdm_storage_op_total{op="ready",result="error",instance="i1"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMStorageReadyFailing
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 5m
        alertname: QSDMStorageReadyFailing
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "ready"
            result: "error"
            severity: "critical"
            subsystem: "v2-storage"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-storage-incident.json"
            description: "qsdm_storage_op_total{op=\"ready\",result=\"error\"} is\nnon-zero on i1 for ≥2m. The\nstorage backend is reporting itself unhealthy on the\nhealth-probe path — either fully offline or\nunreachable.\n\nLikely causes:\n  - SQLite: db file deleted, FS unmounted, fsync\n    failure on the journal.\n  - FileStorage: storage directory removed or\n    permissions broken.\n  - Scylla: session lost (auth expiry, TLS cert\n    rotation, network partition to the cluster).\n\nImmediate consequences:\n  - /api/v1/health returns 503 — load balancers\n    will (correctly) take this node out of rotation.\n  - QSDMNoTransactionsStored will follow within\n    30m if this stays unresolved.\n  - QSDMMiningChainStuck will follow if a majority\n    of validators hit this concurrently.\n\nTriage:\n  - Confirm the underlying backend is reachable:\n      - SQLite: `ls -la <db-path>` from the node.\n      - FileStorage: `ls -la <storage-dir>`.\n      - Scylla: `cqlsh <host>` from the node.\n  - If the backend is alive but the validator can't\n    reach it, the issue is between the node and the\n    backend (DNS, TLS, auth, firewall). Restart\n    with the correct config.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/STORAGE_INCIDENT.md#32-mode-b--qsdmstoragereadyfailing"
            summary: "i1: storage Ready() probe failing"

  # -------------------------------------------------------------------
  # qsdm-p2p — libp2p peer-graph health
  # NETWORKING_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMP2PNoPeers — peers == 0 with provider live, for:5m"
    interval: 1m
    # peers stays 0 the whole interval; alert crosses
    # for:5m at 6m.
    input_series:
      - series: 'qsdm_p2p_peers_connected{provider="live",instance="i1"}'
        values: '0+0x30'
    alert_rule_test:
      - eval_time: 4m
        alertname: QSDMP2PNoPeers
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 7m
        alertname: QSDMP2PNoPeers
        exp_alerts:
        - exp_labels:
            instance: "i1"
            provider: "live"
            severity: "warning"
            subsystem: "v2-networking"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-networking-incident.json"
            description: "qsdm_p2p_peers_connected{instance=\"i1\",provider=\"live\"}\nhas been 0 for ≥5m. The validator is islanded from\nthe rest of the network — no inbound gossip, no\noutbound publish reachability. Mining / consensus\nparticipation is effectively dead while in this\nstate.\n\nCommon causes:\n  - libp2p TCP port not reachable (firewall change,\n    k8s service config drift, wrong host port).\n  - mDNS-only test deploy on a host with no peer\n    neighbours.\n  - Bootstrap peer list is wrong / unreachable.\n  - libp2p host shutdown but process not crashed\n    (Network.Close() was called and never replaced).\n\nTriage:\n  - On the node: `ss -tnp | grep <libp2p-port>` to\n    confirm the listener is bound and accepting.\n  - From a known-good peer: try to dial this host\n    directly and confirm whether it accepts the\n    connection.\n  - Check `qsdm_p2p_messages_total{direction=\"in\"}`\n    rate — if 0 across the whole fleet, the\n    ingress side of gossip is dead at every node\n    (likely a deploy-wide config issue, not a\n    single-host problem).\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/NETWORKING_INCIDENT.md#31-mode-a--qsdmp2pnopeers"
            summary: "i1: libp2p peer count == 0 for ≥5m"

  - name: "QSDMP2PGossipIngressStalled — peers > 0 + zero inbound rate for 10m, for:10m"
    interval: 1m
    # peers stays at 5 (provider="live"), inbound counter
    # flatlines at 0 for the full 30m. The 10m rate window
    # + 10m for: gives a cross at 20m.
    input_series:
      - series: 'qsdm_p2p_peers_connected{provider="live",instance="i1"}'
        values: '5+0x30'
      - series: 'qsdm_p2p_messages_total{direction="in",instance="i1"}'
        values: '0+0x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: QSDMP2PGossipIngressStalled
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 22m
        alertname: QSDMP2PGossipIngressStalled
        exp_alerts:
        - exp_labels:
            instance: "i1"
            provider: "live"
            severity: "warning"
            subsystem: "v2-networking"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-networking-incident.json"
            description: "On i1, qsdm_p2p_peers_connected\n> 0 but the inbound message rate is exactly zero\nfor ≥10m. The validator's libp2p host has live\nconnections that aren't producing pubsub\ntraffic.\n\nLikely:\n  - Subscription on the qsdm-transactions topic\n    was dropped (e.g. context cancellation but\n    handleMessages goroutine still nominally\n    \"running\").\n  - One-way network partition: outbound dials work,\n    inbound payload delivery is silently dropped\n    (NAT misconfiguration, asymmetric firewall).\n  - All connected peers have been quarantined or\n    are themselves muted from the topic.\n\nTriage:\n  - Cross-check QSDMQuarantineAnySubmesh — if\n    co-firing, our peer set is silenced by quarantine\n    policy rather than broken at the network layer.\n  - Restart the validator. handleMessages re-binds\n    the subscription cleanly on startup, so a\n    bounce is the cheapest recovery for transient\n    cases. If the alert re-fires immediately\n    after restart, it's a network-layer issue,\n    not a goroutine drift.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/NETWORKING_INCIDENT.md#32-mode-b--qsdmp2pgossipingressstalled"
            summary: "i1: peers > 0 but no inbound gossip for ≥10m"

  # -------------------------------------------------------------------
  # qsdm-contracts-bridge — contract exec + bridge op health
  # CONTRACTS_BRIDGE_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMContractExecuteErrorRate — exec error rate > 50% with >=1/min, for:15m"
    interval: 1m
    # 1 success/min + 2 error/min sustained → error ratio
    # = 2/3 > 0.5 with rate=3/min ≥ 1/min. Crosses for:15m
    # at ~30m.
    input_series:
      - series: 'qsdm_contract_executions_total{result="success",instance="i1"}'
        values: '0+1x40'
      - series: 'qsdm_contract_executions_total{result="error",instance="i1"}'
        values: '0+2x40'
    alert_rule_test:
      - eval_time: 14m
        alertname: QSDMContractExecuteErrorRate
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDMContractExecuteErrorRate
        exp_alerts:
        - exp_labels:
            instance: "i1"
            result: "error"
            severity: "warning"
            subsystem: "v2-contracts"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-contracts-bridge-incident.json"
            description: "ContractEngine.ExecuteContract on\ni1 has been failing at >50%\nof total volume (with ≥1 call/min) sustained for\n≥15m. Likely:\n  - WASM runtime regression (per-contract wazero\n    or shared wazero failing systematically).\n  - Gas envelope misconfiguration causing the\n    majority of calls to exhaust their limit.\n  - ABI/codec drift after a deploy: callers are\n    passing args the contracts no longer accept.\n  - simulation-fallback path producing an error\n    where the real WASM runtime would have\n    succeeded.\n\nTriage:\n  - Inspect node logs for \"function not found\",\n    \"gas exhausted\", or runtime panic stacks.\n  - Cross-check qsdm_stub_active{kind=\"wasm_sdk\"} —\n    if 1, the WASM SDK stub is active, which can\n    produce systematic errors. See\n    STUB_DEPLOYMENT_INCIDENT.md.\n  - If failure is concentrated to a single\n    contract, that contract has likely shipped a\n    broken update; consider rolling it back.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/CONTRACTS_BRIDGE_INCIDENT.md#31-mode-a--qsdmcontractexecuteerrorrate"
            summary: "i1: contract execution error rate > 50% for ≥15m"

  - name: "QSDMBridgeOpErrorBurst — bridge error rate > 0.2/min for 10m, for:10m"
    interval: 1m
    # 1 redeem error per minute → rate*60 = 1 > 0.2. The
    # 10m rate window saturates at 10m, then for:10m
    # fires at 20m.
    input_series:
      - series: 'qsdm_bridge_op_total{op="redeem",result="error",instance="i1"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 9m
        alertname: QSDMBridgeOpErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 22m
        alertname: QSDMBridgeOpErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "redeem"
            result: "error"
            severity: "warning"
            subsystem: "v2-bridge"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-contracts-bridge-incident.json"
            description: "BridgeProtocol on i1 has had\nerrors at >0.2/min sustained for ≥10m. Drill by\nop tag to identify the failing stage:\n\n  topk(3, sum by (op) (rate(qsdm_bridge_op_total{result=\"error\"}[10m])))\n\nPer-op interpretation:\n  - op=\"lock\": secret-generation failed, or the\n    source-chain lock state is stuck. Inspect\n    generateSecret / generateLockID call paths.\n  - op=\"redeem\": invalid-secret spam (adversarial\n    or buggy redeemer client) OR cross-chain\n    proof failures. Cross-reference with\n    qsdm_p2p_messages_total — a redeem-error\n    burst with no other p2p activity hints at\n    spam.\n  - op=\"refund\": post-expiry recovery is failing\n    — locks aren't transitioning to LockStatusRefunded.\n    This is the highest-stakes case: funds are\n    stuck. Investigate immediately.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/CONTRACTS_BRIDGE_INCIDENT.md#32-mode-b--qsdmbridgeoperrorburst"
            summary: "i1: bridge op error rate > 0.2/min for ≥10m"

  # -------------------------------------------------------------------
  # qsdm-reputation — peer-reputation tracker health
  # REPUTATION_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMReputationBanRatioHigh — banned/total > 0.5 with >=4 peers, for:10m"
    interval: 1m
    # 5 of 8 peers banned (ratio = 0.625 > 0.5) with
    # total >= 4 sustained for 30m → for:10m fires at 10m.
    input_series:
      - series: 'qsdm_reputation_peers_total{tracker="tx",instance="i1"}'
        values: '8+0x30'
      - series: 'qsdm_reputation_peers_banned{tracker="tx",instance="i1"}'
        values: '5+0x30'
    alert_rule_test:
      - eval_time: 9m
        alertname: QSDMReputationBanRatioHigh
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 12m
        alertname: QSDMReputationBanRatioHigh
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-reputation"
            tracker: "tx"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-reputation-incident.json"
            description: "qsdm_reputation_peers_banned /\nqsdm_reputation_peers_total on\ni1 (tracker=tx)\nhas been > 0.5 for ≥10m with ≥4 tracked peers.\nEither a coordinated attack against this node OR\na penalty-config regression mass-banning honest\npeers.\n\nTriage:\n  - Inspect AllPeers() via the admin API\n    (or equivalent endpoint exposing the\n    tracker's BannedPeers list). If the banned\n    set is dominated by repeated misbehaviour\n    from peers that pre-date the alert, this is\n    an attack. If the banned set is recent and\n    the misbehaviour counts are low, the\n    penalty config has shifted (e.g. someone\n    tightened InvalidTxWeight without thinking\n    through the cascade).\n  - Cross-check tracker=\"evidence\" vs.\n    tracker=\"tx\": if both show high ban ratios\n    concurrently, the cause is likely systemic;\n    if only one, the cause is per-tracker\n    config or per-tracker traffic shape.\n  - Cross-check qsdm_quarantine_* — if a\n    majority of peers are also quarantined by\n    submesh policy, the failure is upstream of\n    reputation.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REPUTATION_INCIDENT.md#31-mode-a--qsdmreputationbanratiohigh"
            summary: "i1: tx ban ratio > 50% for ≥10m"

  - name: "QSDMReputationScoreCollapse — min < -100 with >=4 peers, for:30m"
    interval: 1m
    # min_score = -150 with peers_total = 6 sustained
    # for 60m → for:30m fires at 30m.
    input_series:
      - series: 'qsdm_reputation_score_min{tracker="tx",instance="i1"}'
        values: '-150+0x60'
      - series: 'qsdm_reputation_peers_total{tracker="tx",instance="i1"}'
        values: '6+0x60'
    alert_rule_test:
      - eval_time: 29m
        alertname: QSDMReputationScoreCollapse
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 40m
        alertname: QSDMReputationScoreCollapse
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "info"
            subsystem: "v2-reputation"
            tracker: "tx"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-reputation-incident.json"
            description: "qsdm_reputation_score_min on\ni1 (tracker=tx)\nhas been below -100 (halfway to ban) for ≥30m\nwith ≥4 tracked peers. Penalties are\naccumulating faster than the configured\nDecayInterval/DecayFactor can pull them back.\nOften a precursor to QSDMReputationBanRatioHigh\n(Mode A) — read the next 30m of trend before\npaging up.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/REPUTATION_INCIDENT.md#32-mode-b--qsdmreputationscorecollapse"
            summary: "i1: tx min-score < -100 for ≥30m"
