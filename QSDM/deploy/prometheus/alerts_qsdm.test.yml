  # -------------------------------------------------------------------
  # qsdm-v2-mining-slashing
  # SLASHING_INCIDENT.md §3.1 / §3.2 / §3.3 / §3.4
  # -------------------------------------------------------------------

  - name: "QSDMMiningSlashApplied — sum(increase) >= 1 in 15m, for:1m"
    interval: 1m
    input_series:
      - series: 'qsdm_slash_applied_total{reason="dust"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 0m
        alertname: QSDMMiningSlashApplied
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMMiningSlashApplied
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-slashing-incident.json"
            description: "At least one qsdm_slash_applied_total has incremented\nin the last 15m. Break out by kind:\n  sum by (kind) (increase(qsdm_slash_applied_total[15m]))\nCross-reference the transaction id via:\n  GET /api/v1/mining/slash/{tx_id}\n(the qsdm CLI: `qsdmcli slash-receipt <tx-id>`).\nConfirm the offender's NodeID, EvidenceKind, and that\nauto_revoked behaved as expected. If kind=\"forged-attestation\"\nin volume, suspect a CC-AIK verifier regression in the\nrelease first (false positives) before assuming widespread\ncheating.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#31-mode-a--qsdmminingslashapplied"
            summary: ": slash transaction applied"

  - name: "QSDMMiningSlashedDustBurst — dust drained > 5e10 in 15m, for:5m"
    interval: 1m
    # Increase 1e10/min → 15m increase = 1.5e11 (3x threshold).
    input_series:
      - series: 'qsdm_slash_drained_dust_total{reason="dust"}'
        values: '0+10000000000x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningSlashedDustBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 21m
        alertname: QSDMMiningSlashedDustBurst
        exp_alerts:
        - exp_labels:
            severity: "critical"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-slashing-incident.json"
            description: "qsdm_slash_drained_dust_total has increased by\n150G dust in 15m (>50 CELL). Multiple\nrigs being slashed at once is almost never coincidental —\nsuspect either a coordinated cheat ring (great, ratify\nand continue) OR a verifier regression that just shipped\nin the latest release (bad, roll back).\n\nTriage:\n  - Group by EvidenceKind:\n      sum by (kind) (increase(qsdm_slash_drained_dust_total[15m]))\n    A single dominant kind = single-source bug.\n  - Compare against pre-release baseline:\n      sum(rate(qsdm_slash_drained_dust_total[1d] offset 1d))\n  - Spot-check a recent slash receipt:\n      qsdmcli slash-receipt <tx-id>\n    If outcome=applied but the operator was clean, halt\n    rollout and roll back the verifier release.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#32-mode-b--qsdmminingslasheddustburst"
            summary: ": >50 CELL slashed in 15m"

  - name: "QSDMMiningSlashRejectionsBurst — sum(increase) >= 10 in 10m, for:5m"
    interval: 1m
    input_series:
      - series: 'qsdm_slash_rejected_total{reason="evidence"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningSlashRejectionsBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMMiningSlashRejectionsBurst
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-slashing-incident.json"
            description: "qsdm_slash_rejected_total grew by 10 in 10m.\nBreak out by reason:\n  sum by (reason) (increase(qsdm_slash_rejected_total[10m]))\nCommon reasons and what they mean:\n  evidence_replayed   — replay protection working;\n                        likely a buggy slasher retrying.\n  verifier_failed     — evidence didn't pass the\n                        EvidenceVerifier; either malformed\n                        or a probe.\n  node_not_enrolled   — slash submitted against an\n                        unknown NodeID; client bug or\n                        spam.\n  insufficient_stake  — slash amount exceeded available\n                        bond; clamp client-side.\nSustained \"verifier_failed\" with no applied slashes\nsuggests an outsider probing the endpoint — fine, but\nconsider rate-limiting upstream of admission.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#33-mode-c--qsdmminingslashrejectionsburst"
            summary: ": ≥10 slash transactions rejected in 10m"

  - name: "QSDMMiningAutoRevokeBurst — sum(increase) >= 3 in 15m, for:5m"
    interval: 1m
    input_series:
      - series: 'qsdm_slash_auto_revoked_total{reason="threshold"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningAutoRevokeBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 21m
        alertname: QSDMMiningAutoRevokeBurst
        exp_alerts:
        - exp_labels:
            severity: "critical"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-slashing-incident.json"
            description: "SlashApplier.RevokeIfUnderBonded fired for 15\nrecords in 15m. Each fire means the slashed miner's\nremaining bond fell below mining.MinEnrollStakeDust\n(10 CELL). Three+ in 15m is unusual — investigate\nwhether the slash amounts were correctly clamped to\nindividual rig stake or whether the ApplySlashTx path\nis double-debiting.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/SLASHING_INCIDENT.md#34-mode-d--qsdmminingautorevokeburst"
            summary: ": ≥3 records auto-revoked by SlashApplier in 15m"

  # -------------------------------------------------------------------
  # qsdm-v2-mining-enrollment
  # ENROLLMENT_INCIDENT.md §3.1–§3.5
  # -------------------------------------------------------------------

  - name: "QSDMMiningRegistryEmpty — active=0 and uptime>600, for:15m"
    interval: 1m
    input_series:
      - series: 'qsdm_enrollment_active_count'
        values: '0x30'
      - series: 'qsdm_process_uptime_seconds'
        values: '700+60x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningRegistryEmpty
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMMiningRegistryEmpty
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-enrollment-incident.json"
            description: "qsdm_enrollment_active_count is 0 on a node that has\nbeen up >10m. Either:\n  - All miners legitimately unenrolled (check\n    qsdm_unenrollment_applied_total rate over the last\n    hour).\n  - The mempool admission gate is rejecting every\n    enrollment (check qsdm_enrollment_rejected_total\n    by reason).\n  - The block producer stopped sealing — cross-check\n    with QSDMMiningChainStuck below.\nProduction v2 mainnet should never sit at active=0;\non testnet this may be acceptable during quiet periods.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#31-mode-a--qsdmminingregistryempty"
            summary: ": zero active enrollments for 15m"

  - name: "QSDMMiningRegistryShrinkingFast — >25% drop over 1h with baseline >= 4, for:10m"
    interval: 1m
    # Stay at 10 for first 70m (1h+ stable history), then drop
    # to 4. offset 1h at t=86m → t=26m where count was 10.
    # (10-4)/10 = 0.6 > 0.25.
    input_series:
      - series: 'qsdm_enrollment_active_count'
        values: '10x70 4x30'
    alert_rule_test:
      - eval_time: 75m
        alertname: QSDMMiningRegistryShrinkingFast
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 86m
        alertname: QSDMMiningRegistryShrinkingFast
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-enrollment-incident.json"
            description: "qsdm_enrollment_active_count dropped by 60%\nin 1h (relative to the 1h-prior reading). Cross-correlate with:\n  - rate(qsdm_unenrollment_applied_total[1h])  — voluntary exits\n  - rate(qsdm_slash_applied_total[1h])         — forced exits\n  - rate(qsdm_enrollment_unbond_swept_total[1h]) — final-stage sweeps\nIf voluntary exits dominate, suspect either a release\nregression (miners hitting a v2-incompatible build) or\nan external incident (e.g. NVIDIA driver rollout). If\nslash-driven, switch to the slashing-group runbook.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#32-mode-b--qsdmminingregistryshrinkingfast"
            summary: ": active enrollments fell 60% in 1h"

  - name: "QSDMMiningPendingUnbondMajority — pending/total > 0.5 with total >= 4, for:30m"
    interval: 1m
    # active=2, pending=3, total=5≥4, ratio=3/5=0.6>0.5.
    input_series:
      - series: 'qsdm_enrollment_active_count'
        values: '2x40'
      - series: 'qsdm_enrollment_pending_unbond_count'
        values: '3x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMMiningPendingUnbondMajority
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDMMiningPendingUnbondMajority
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-enrollment-incident.json"
            description: "More than half of the bonded population is in the 7-day\nunbond window. Compare:\n  qsdm_enrollment_pending_unbond_count\n  qsdm_enrollment_active_count\n  qsdm_enrollment_pending_unbond_dust  (CELL locked)\n  qsdm_enrollment_bonded_dust          (CELL active)\nCoordinated exit usually precedes a fork-vote, a\nclient-software regression, or a known driver rollout\nincompatibility. Investigate before the 7-day sweep\nwindow closes — once balances credit back, recovery\nrequires re-enrollment with fresh bond.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#33-mode-c--qsdmminingpendingunbondmajority"
            summary: ": 60% of bonded miners pending unbond"

  - name: "QSDMMiningEnrollmentRejectionsBurst — sum(increase) >= 20 in 10m, for:5m"
    interval: 1m
    # 2/min → increase[10m] = 20.
    input_series:
      - series: 'qsdm_enrollment_rejected_total{reason="bond_too_small"}'
        values: '0+2x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningEnrollmentRejectionsBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 17m
        alertname: QSDMMiningEnrollmentRejectionsBurst
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-enrollment-incident.json"
            description: "qsdm_enrollment_rejected_total grew by 20 in\n10m. Break out by reason:\n  sum by (reason) (increase(qsdm_enrollment_rejected_total[10m]))\nCommon reasons:\n  insufficient_stake — client offered <10 CELL bond.\n  gpu_uuid_collision — two NodeIDs claimed the same GPU.\n  malformed_payload  — old client / canonicaljson drift.\n  duplicate_node_id  — re-enroll without unbond first.\nSustained \"malformed_payload\" after a release suggests\nclient-server skew — pin client minimum version in the\nquickstart docs.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#34-mode-d--qsdmminingenrollmentrejectionsburst"
            summary: ": ≥20 enrollment rejections in 10m"

  - name: "QSDMMiningBondedDustDropped — bond drops > 5e10 over 30m, for:10m"
    interval: 1m
    # Stay at 1e11 for 30m, then drop to 4e10 → drop=6e10>5e10.
    input_series:
      - series: 'qsdm_enrollment_bonded_dust'
        values: '100000000000x30 40000000000x30'
    alert_rule_test:
      - eval_time: 35m
        alertname: QSDMMiningBondedDustDropped
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 46m
        alertname: QSDMMiningBondedDustDropped
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-enrollment-incident.json"
            description: "Total active bond fell by 60G dust\n(>50 CELL) in 30m. Decompose:\n  - Voluntary: rate(qsdm_unenrollment_applied_total[30m])\n  - Forced:    rate(qsdm_slash_drained_dust_total[30m])\n  - Sweep:     rate(qsdm_enrollment_unbond_swept_total[30m])\nIf neither driver explains the magnitude, suspect a\nmetric callback regression (the gauge is read live from\nEnrollmentStateProvider — a stale provider will read\nstale numbers).\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#35-mode-e--qsdmminingbondeddustdropped"
            summary: ": bonded stake dropped >50 CELL in 30m"

  # -------------------------------------------------------------------
  # qsdm-v2-mining-liveness — chain liveness sentinels
  # MINING_LIVENESS.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDMMiningChainStuck — delta(height[5m])=0 and uptime>300, for:3m"
    interval: 1m
    input_series:
      - series: 'qsdm_chain_height'
        values: '100x30'
      - series: 'qsdm_process_uptime_seconds'
        values: '400+60x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMMiningChainStuck
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 9m
        alertname: QSDMMiningChainStuck
        exp_alerts:
        - exp_labels:
            severity: "critical"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-mining-liveness.json"
            description: "Block production has stalled. v2 mining alerts above\n(slash, enrollment) will go quiet because the applier\nis the consumer of these counters. Triage in this\norder:\n  1. qsdm_mempool_size — growing? validator stuck on\n     admission. Empty? validator never built a block.\n  2. qsdm_validators_active — quorum?\n  3. Process logs for \"ProduceBlock\" errors — the\n     \"all transactions failed\" path silently freezes\n     the producer when no tx applies.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/MINING_LIVENESS.md#31-mode-a--qsdmminingchainstuck"
            summary: ": qsdm_chain_height has not advanced in 5m"

  - name: "QSDMMiningMempoolBacklog — mempool > 10000, for:10m"
    interval: 1m
    input_series:
      - series: 'qsdm_mempool_size'
        values: '20000x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMMiningMempoolBacklog
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 11m
        alertname: QSDMMiningMempoolBacklog
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/deploy/grafana/dashboards/qsdm-runbook-mining-liveness.json"
            description: "qsdm_mempool_size is 20000. Either traffic spiked\npast producer throughput, or the admission gate is\nletting through txs that ApplySlashTx / ApplyEnrollTx\nreject at apply time (admission stateless, applier\nstateful — a known divergence vector).\nCross-check qsdm_slash_rejected_total and\nqsdm_enrollment_rejected_total; high rejection rate\nmeans admission is not catching what apply does.\n"
            runbook_url: "https://github.com/blackbeardONE/QSDM/blob/main/QSDM/docs/docs/runbooks/MINING_LIVENESS.md#32-mode-b--qsdmminingmempoolbacklog"
            summary: ": mempool >10k pending for 10m"

  # -------------------------------------------------------------------
  # qsdm-v2-attest-archspoof — adversarial arch-claim defence
  # ARCH_SPOOF_INCIDENT.md §3.1 / §3.2 / §3.3
  # -------------------------------------------------------------------

  - name: "QSDMAttestArchSpoofUnknownArchBurst — rate{unknown_arch} > 0.1, for:10m"
    interval: 1m
    # 12/min = 0.2/s; 2x the 0.1/s threshold.
    input_series:
      - series: 'qsdm_attest_archspoof_rejected_total{reason="unknown_arch"}'
        values: '0+12x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMAttestArchSpoofUnknownArchBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMAttestArchSpoofUnknownArchBurst
        exp_alerts:
        - exp_labels:
            reason: "unknown_arch"
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
